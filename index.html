                                        <div className="grid grid-cols-4 gap-2">{sortedCategories.map(c => <button type="button" key={c.id} onClick={() => setNewTransaction({ ...newTransaction, categoryId: c.id })} className={`p-3 rounded-2xl border flex flex-col items-center gap-1.5 transition-all tap-feedback ${newTransaction.categoryId === c.id ? 'border-neon-green bg-green-500/10 text-green-300 shadow-[0_0_15px_rgba(0,255,157,0.15)]' : 'border-glass-200 bg-glass-100 text-slate-500 hover:bg-glass-200'}`}><span className="text-lg"><Icon name={c.icon} size={20} /></span><span className="text-[10px] font-bold truncate w-full text-center">{c.name}</span></button>)}</div>

                                        {/* Quick Amount Presets */}
                                        <div className="flex gap-2 justify-center">
                                            {[5, 10, 20, 50].map(amt => (
                                                <button key={amt} type="button" onClick={() => setNewTransaction({ ...newTransaction, amount: amt.toString() })}
                                                    className={`px-4 py-2 rounded-xl text-sm font-bold transition-all tap-feedback ${newTransaction.amount === amt.toString() ? 'bg-neon-green text-black' : 'bg-glass-100 text-slate-400 hover:bg-glass-200 border border-glass-200'}`}>
                                                    ${amt}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="relative group">
                                            <span className="absolute left-6 top-1/2 -translate-y-1/2 font-bold text-2xl text-slate-500">$</span>
                                            <input type="number" step="0.01" required value={newTransaction.amount} onChange={(e) => setNewTransaction({ ...newTransaction, amount: e.target.value })} className="w-full pl-12 pr-16 py-6 text-5xl font-black text-white bg-black/30 border border-glass-200 rounded-3xl focus:border-neon-green focus:shadow-[0_0_20px_rgba(0,255,157,0.1)] outline-none transition-all placeholder-slate-700 text-center" placeholder="0" />
                                            <button type="button" onClick={handleVoiceInput} className={`absolute right-4 top-1/2 -translate-y-1/2 p-2 rounded-xl transition-all tap-feedback ${isListening ? 'bg-neon-red text-white animate-pulse' : 'bg-glass-100 text-slate-400 hover:text-neon-blue'}`}>
                                                <Icon name="mic" size={20} />
                                            </button>
                                        </div>

                                        {newTransaction.categoryId && (
                                            <div className="flex gap-2 flex-wrap justify-center">
                                                {['Food', 'Gas', 'Coffee', 'Shopping', 'Bills'].slice(0, 4).map(desc => (
                                                    <button key={desc} type="button" onClick={() => setNewTransaction({ ...newTransaction, description: desc })}
                                                        className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${newTransaction.description === desc ? 'bg-neon-purple/20 text-neon-purple border-neon-purple/30' : 'bg-glass-100 text-slate-500 hover:text-slate-300'} border border-glass-200`}>
                                                        {desc}
                                                    </button>
                                                ))}
                                            </div>
                                        )}

                                        <div className="flex flex-col gap-3">
                                            <div className="flex gap-2 flex-wrap">
                                                {availableTags.map(tag => (
                                                    <button key={tag} type="button" onClick={() => {
                                                        const tags = newTransaction.tags.includes(tag) 
                                                            ? newTransaction.tags.filter(t => t !== tag) 
                                                            : [...newTransaction.tags, tag];
                                                        setNewTransaction({ ...newTransaction, tags });
                                                    }} className={`px-3 py-1 rounded-full text-xs font-bold transition-all border ${newTransaction.tags.includes(tag) ? 'bg-neon-purple/20 text-neon-purple border-neon-purple/30' : 'bg-glass-100 text-slate-500 border-glass-200'}`}>
                                                        #{tag}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="flex gap-2">
                                                <input type="text" value={newTagInput} onChange={e => setNewTagInput(e.target.value)} onKeyDown={e => {
                                                    if(e.key === 'Enter') {
                                                        e.preventDefault();
                                                        if(newTagInput.trim() && !availableTags.includes(newTagInput.trim().toLowerCase())) {
                                                            const t = newTagInput.trim().toLowerCase();
                                                            const newAvail = [...availableTags, t];
                                                            setAvailableTags(newAvail);
                                                            localStorage.setItem('tags_v2', JSON.stringify(newAvail));
                                                            setNewTransaction({ ...newTransaction, tags: [...newTransaction.tags, t] });
                                                            setNewTagInput('');
                                                        }
                                                    }
                                                }} placeholder="New tag (press Enter)" className="flex-1 p-3 bg-black/30 border border-glass-200 rounded-xl text-sm font-bold text-white focus:border-neon-purple outline-none" />
                                                <button type="button" onClick={() => {
                                                    if(newTagInput.trim() && !availableTags.includes(newTagInput.trim().toLowerCase())) {
                                                        const t = newTagInput.trim().toLowerCase();
                                                        const newAvail = [...availableTags, t];
                                                        setAvailableTags(newAvail);
                                                        localStorage.setItem('tags_v2', JSON.stringify(newAvail));
                                                        setNewTransaction({ ...newTransaction, tags: [...newTransaction.tags, t] });
                                                        setNewTagInput('');
                                                    }
                                                }} className="px-4 bg-glass-100 text-slate-400 font-bold rounded-xl text-sm hover:text-white border border-glass-200">Add</button>
                                            </div>
                                        </div>

                                        <input type="text" value={newTransaction.description} onChange={(e) => setNewTransaction({ ...newTransaction, description: e.target.value })} className="w-full p-4 font-semibold text-white bg-black/30 border border-glass-200 rounded-2xl focus:border-neon-green/50 outline-none transition-all placeholder-slate-600 text-center" placeholder="Add a note..." />

                                        {/* Recurring Toggle */}
                                        <div className="flex items-center justify-center gap-3">
                                            <span className="text-xs text-slate-500 font-bold">Repeat:</span>
                                            {['none', 'weekly', 'monthly'].map(freq => (
                                                <button key={freq} type="button" onClick={() => setNewTransaction({ ...newTransaction, recurring: freq })}
                                                    className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${newTransaction.recurring === freq ? 'bg-neon-blue/20 text-neon-blue border-neon-blue/30' : 'bg-glass-100 text-slate-500'} border border-glass-200`}>
                                                    {freq === 'none' ? 'Once' : freq.charAt(0).toUpperCase() + freq.slice(1)}
                                                </button>
                                            ))}
                                        </div>

                                        <button type="submit" disabled={!newTransaction.categoryId || !newTransaction.amount} className={`w-full py-5 text-lg text-black font-bold rounded-2xl shadow-lg flex items-center justify-center gap-3 transition-all tap-feedback ${newTransaction.type === 'income' ? 'bg-neon-green shadow-[0_0_20px_rgba(0,255,157,0.3)]' : 'bg-neon-red shadow-[0_0_20px_rgba(255,0,85,0.3)] text-white'} disabled:opacity-50 disabled:shadow-none`}>Save Transaction <Icon name="check" size={20} /></button>
                                    </form>
                                )}
                            </div>
                        )}

                        {/* ========== HISTORY ========== */}
                        {view === 'history' && (
                            <div className="animate-enter space-y-4">
                                <div className="flex justify-between items-center px-1"><h2 className="text-3xl font-black tracking-tight text-gradient-premium">History</h2></div>
                                <div className="relative">
                                    <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                                    <input type="text" placeholder="Search..." className="w-full pl-12 pr-10 p-4 bg-black/30 border border-glass-200 rounded-2xl text-white font-bold focus:border-neon-blue/50 outline-none transition-all" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                    {searchQuery && <button onClick={() => setSearchQuery('')} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white"><Icon name="x" size={16} /></button>}
                                </div>
                                <div className="premium-toolbar p-3 space-y-3">
                                    <div className="grid grid-cols-2 gap-2">
                                        <select value={historyFilters.type} onChange={e => setHistoryFilters({ ...historyFilters, type: e.target.value })} className="p-3 bg-white/[0.04] border border-white/10 rounded-xl text-white text-xs font-bold outline-none">
                                            <option value="all">All Types</option>
                                            <option value="expense">Expenses</option>
                                            <option value="income">Income</option>
                                            <option value="transfer">Transfers</option>
                                        </select>
                                        <select value={historyFilters.categoryId} onChange={e => setHistoryFilters({ ...historyFilters, categoryId: e.target.value })} className="p-3 bg-white/[0.04] border border-white/10 rounded-xl text-white text-xs font-bold outline-none">
                                            <option value="all">All Envelopes</option>
                                            {categories.map(cat => <option key={cat.id} value={cat.id}>{cat.name}</option>)}
                                        </select>
                                        <input type="date" value={historyFilters.dateFrom} onChange={e => setHistoryFilters({ ...historyFilters, dateFrom: e.target.value })} className="p-3 bg-white/[0.04] border border-white/10 rounded-xl text-white text-xs font-bold outline-none" />
                                        <input type="date" value={historyFilters.dateTo} onChange={e => setHistoryFilters({ ...historyFilters, dateTo: e.target.value })} className="p-3 bg-white/[0.04] border border-white/10 rounded-xl text-white text-xs font-bold outline-none" />
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto pb-1">
                                        {availableTags.map(tag => (
                                            <button key={tag} onClick={() => setSelectedFilterTags(selectedFilterTags.includes(tag) ? selectedFilterTags.filter(t => t !== tag) : [...selectedFilterTags, tag])} className={`px-3 py-2 rounded-xl text-[10px] font-black border transition-all whitespace-nowrap ${selectedFilterTags.includes(tag) ? 'bg-cyan-400/15 text-cyan-200 border-cyan-300/30' : 'bg-white/[0.035] text-slate-500 border-white/10'}`}>#{tag}</button>
                                        ))}
                                        {(historyFilters.type !== 'all' || historyFilters.categoryId !== 'all' || historyFilters.dateFrom || historyFilters.dateTo || selectedFilterTags.length > 0) && (
                                            <button onClick={() => { setHistoryFilters({ type: 'all', categoryId: 'all', dateFrom: '', dateTo: '' }); setSelectedFilterTags([]); }} className="px-3 py-2 rounded-xl text-[10px] font-black bg-white/10 text-white whitespace-nowrap border border-white/10">Clear</button>
                                        )}
                                    </div>
                                </div>
                                <div className="space-y-3 pb-24">
                                    {filteredTx.length === 0 ? (
                                        <div className="text-center py-20">
                                            <div className="empty-float text-6xl mb-4">📭</div>
                                            <p className="text-slate-500 font-medium">No transactions found</p>
                                            <p className="text-slate-600 text-sm mt-1">Start tracking by adding your first expense!</p>
                                        </div>
                                    ) : filteredTx.map(t => (
                                        <div key={t.id} className="glass-card p-4 rounded-2xl flex justify-between items-center shadow-sm hover:bg-white/[0.07] transition-colors border border-white/10">
                                            <div className="flex items-center gap-4">
                                                <div className={`p-3 rounded-2xl ${t.type === 'income' ? 'bg-emerald-400/10 text-emerald-300' : t.type === 'transfer' ? 'bg-cyan-400/10 text-cyan-300' : 'bg-rose-400/10 text-rose-300'}`}>
                                                    <Icon name={t.categoryId === 'system' ? 'rss' : t.type === 'income' ? 'arrow-down' : t.type === 'transfer' ? 'arrow-right-left' : 'arrow-up'} size={20} />
                                                </div>
                                                <div>
                                                    <p className="font-bold text-white text-sm flex items-center gap-1">
                                                        {t.description}
                                                        {t.recurring && t.recurring !== 'none' && <span className="text-[9px] text-neon-blue bg-neon-blue/10 px-1.5 py-0.5 rounded">🔁 {t.recurring}</span>}
                                                    </p>
                                                    <p className="text-xs text-slate-500 mt-0.5 font-medium">
                                                        {new Date(t.date).toLocaleDateString()} • {t.categoryName}
                                                        {t.tags && t.tags.length > 0 && <span className="ml-2 text-[10px] text-neon-purple font-bold">#{t.tags.join(' #')}</span>}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className={`font-black text-lg tracking-tight ${t.type === 'income' ? 'text-emerald-300' : t.type === 'transfer' ? 'text-cyan-300' : 'text-rose-300'}`}>
                                                    {t.type === 'income' ? '+' : t.type === 'transfer' ? '' : '-'}${parseFloat(t.amount).toFixed(2)}
                                                </span>
                                                {t.categoryId !== 'system' && <button onClick={() => startEditTransaction(t)} className="text-slate-600 hover:text-neon-green p-2 transition-colors" title="Edit"><Icon name="edit-3" size={18} /></button>}
                                                <button onClick={() => requestConfirm('Delete transaction?', 'This removes the transaction and adjusts the envelope balance. You can undo right after.', () => handleDelete(t.id), 'Delete')} className="text-slate-600 hover:text-neon-red p-2 transition-colors" title="Delete"><Icon name="trash-2" size={18} /></button>
                                                <button onClick={() => handleClone(t)} className="text-slate-600 hover:text-neon-blue p-2 transition-colors"><Icon name="copy" size={18} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ========== SETTINGS ========== */}
                        {view === 'settings' && (
                            <div className="animate-enter space-y-6">
                                <h2 className="text-3xl font-black tracking-tight text-gradient-premium">Settings</h2>
                                <div className="glass-card p-6 rounded-3xl border border-neon-purple/30 relative overflow-hidden">
                                    <label className="text-xs font-bold text-neon-purple uppercase mb-3 block flex items-center gap-2"><Icon name="key" size={12} /> Gemini API Key</label>
                                    <input type="password" value={geminiKey} onChange={e => { setGeminiKey(e.target.value); localStorage.setItem('gemini_key', e.target.value); }} placeholder="Paste Key..." className="w-full p-4 bg-black/50 border border-glass-200 rounded-xl text-white text-sm mb-4 font-mono focus:border-neon-purple transition-all" />
                                    <label className="text-xs font-bold text-neon-purple uppercase mb-3 block">Model Version</label>
                                    <select value={aiModel} onChange={e => { setAiModel(e.target.value); localStorage.setItem('ai_model', e.target.value); }} className="w-full p-4 bg-black/50 border border-glass-200 rounded-xl text-white text-sm font-bold appearance-none">
                                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (Preview)</option>
                                        <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
                                        <option value="gemini-3-flash-preview">Gemini 3.0 Flash (Preview)</option>
                                        <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
                                    </select>
                                </div>

                                <button onClick={handleTuneUp} className="w-full glass-card p-5 rounded-2xl text-neon-purple font-bold text-sm flex items-center justify-center gap-2 border-neon-purple/30 hover:bg-neon-purple/10 hover:scale-[1.02] transition-all"><Icon name="sliders" /> Auto-Tune Budget (Agent)</button>
                                {showTuneUp && tuneUpProposals && (<div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 backdrop-blur-xl animate-enter"><div className="bg-glass-nav border border-neon-purple/50 rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl overflow-y-auto max-h-[80vh]"><h3 className="text-2xl font-black text-white mb-6">AI Proposals</h3><div className="space-y-4 mb-8">{tuneUpProposals.map(p => { const cat = categories.find(c => c.id === p.id); return (<div key={p.id} className="bg-glass-100 p-4 rounded-2xl border border-glass-200"><div className="flex justify-between font-bold text-slate-200 text-lg"><span>{cat?.name}</span> <span className="text-neon-blue">${p.newLimit}</span></div><div className="text-sm text-slate-400 mt-2 leading-relaxed">{p.reason}</div></div>); })}</div><div className="flex gap-3"><button onClick={() => { setShowTuneUp(false); setTuneUpProposals(null); }} className="flex-1 py-4 text-slate-400 font-bold bg-glass-100 rounded-2xl">Cancel</button><button onClick={applyTuneUp} className="flex-1 py-4 text-black bg-neon-blue font-bold rounded-2xl shadow-lg">Apply</button></div></div></div>)}

                                <div className="grid grid-cols-2 gap-3"><button onClick={handleBackup} className="glass-card p-4 rounded-2xl text-xs font-bold text-neon-green flex flex-col items-center gap-2 hover:bg-neon-green/10 border-neon-green/20 transition-all"><Icon name="save" /> Backup Data</button><button onClick={() => fileInputRef.current.click()} className="glass-card p-4 rounded-2xl text-xs font-bold text-neon-blue flex flex-col items-center gap-2 hover:bg-neon-blue/10 border-neon-blue/20 transition-all"><Icon name="upload-cloud" /> Restore Data <input type="file" ref={fileInputRef} onChange={handleRestore} className="hidden" /></button></div>
                                <div className="grid grid-cols-2 gap-3"><button onClick={handlePrint} className="glass-card p-4 rounded-2xl text-xs font-bold text-slate-300 flex flex-col items-center gap-2 hover:bg-white/10 border-glass-200 transition-all"><Icon name="printer" /> Print / PDF</button><button onClick={handleExport} className="glass-card p-4 rounded-2xl text-xs font-bold text-slate-300 flex flex-col items-center gap-2 hover:bg-white/10 border-glass-200 transition-all"><Icon name="download" /> Export CSV</button></div>

                                <div className="flex justify-between items-end px-2 pt-4 pb-2"><h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider">Envelopes</h3><button onClick={() => setShowAddCat(true)} className="text-xs font-bold text-white bg-glass-100 px-4 py-1.5 rounded-full hover:bg-glass-200 transition-colors">+ New</button></div>
                                <div className="space-y-3">{categories.map(cat => (<div key={cat.id} className="glass-card p-4 rounded-2xl flex flex-col gap-3"><div className="flex justify-between items-center w-full"><div className="flex items-center gap-4"><div className="text-2xl opacity-80 text-slate-400"><Icon name={cat.icon} /></div><div><p className="font-bold text-slate-200 flex items-center gap-2">{cat.name} {cat.pinned && <span className="text-xs text-neon-amber">⭐</span>}</p><p className="text-xs text-slate-500 font-bold uppercase">{cat.frequency}</p></div></div><div className="flex items-center gap-2"><button onClick={() => handleTogglePin(cat.id)} className={`p-2 rounded-xl text-xs transition-all ${cat.pinned ? 'bg-neon-amber/20 text-neon-amber' : 'bg-glass-100 text-slate-500 hover:text-neon-amber'}`}><Icon name="star" size={14} /></button><button onClick={() => { setEditingCategory(cat.id); setEditForm({ limit: cat.limit, balance: cat.balance, name: cat.name }); }} className="bg-glass-100 px-4 py-2 rounded-xl text-xs font-bold text-slate-400 flex items-center gap-2 border border-glass-200 hover:text-white">Edit <Icon name="edit-2" size={12} className="opacity-50" /></button></div></div>{editingCategory === cat.id && (<div className="bg-black/30 p-4 rounded-2xl border border-glass-200 mt-2 animate-enter"><div className="mb-3"><label className="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Name</label><input type="text" className="w-full pl-4 p-3 rounded-xl bg-black/50 border border-glass-200 font-bold text-white outline-none focus:border-neon-blue" value={editForm.name} onChange={e => setEditForm({ ...editForm, name: e.target.value })} /></div><div className="grid grid-cols-2 gap-4 mb-4"><div><label className="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Balance</label><input type="number" className="w-full pl-4 p-3 rounded-xl bg-black/50 border border-glass-200 font-bold text-white outline-none focus:border-neon-blue" value={editForm.balance} onChange={e => setEditForm({ ...editForm, balance: e.target.value })} /></div><div><label className="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Limit</label><input type="number" className="w-full pl-4 p-3 rounded-xl bg-black/50 border border-glass-200 font-bold text-white outline-none focus:border-neon-blue" value={editForm.limit} onChange={e => setEditForm({ ...editForm, limit: e.target.value })} /></div></div><div className="flex gap-2"><button onClick={() => handleDeleteCategory(cat.id)} className="p-3 text-neon-red bg-neon-red/10 rounded-xl hover:bg-neon-red/20"><Icon name="trash-2" size={18} /></button><button onClick={() => setEditingCategory(null)} className="flex-1 py-3 font-bold text-slate-400 hover:bg-glass-100 rounded-xl">Cancel</button><button onClick={() => handleUpdateCat(cat.id)} className="flex-1 py-3 bg-neon-blue text-black font-bold rounded-xl shadow-md hover:bg-cyan-400">Save</button></div></div>)}</div>))}</div>

                                {/* Cycle History */}
                                {cycleHistory.length > 0 && (
                                    <div className="pt-4">
                                        <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider px-2 mb-3 flex items-center gap-2">
                                            <Icon name="history" size={14} /> Cycle History
                                        </h3>
                                        <div className="space-y-2">
                                            {cycleHistory.slice(-5).reverse().map((entry, i) => (
                                                <div key={i} className="glass-card p-4 rounded-2xl">
                                                    <div className="flex justify-between items-center">
                                                        <div>
                                                            <span className="text-sm font-bold text-slate-200">Cycle {entry.cycle}</span>
                                                            <p className="text-[10px] text-slate-500 mt-0.5">
                                                                {new Date(entry.startDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – {new Date(entry.endDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                                                            </p>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className="text-sm font-black text-neon-red">${entry.totalSpent.toFixed(0)}</span>
                                                            <p className="text-[10px] text-slate-500">spent</p>
                                                        </div>
                                                    </div>
                                                    {entry.rolloverSummary && <p className="text-[10px] text-slate-500 mt-2 bg-glass-100 px-3 py-1.5 rounded-lg">Rollover: {entry.rolloverSummary}</p>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="pt-8 pb-8"><button onClick={() => setShowResetConfirm(true)} className="w-full p-5 text-neon-red bg-neon-red/10 border border-neon-red/20 rounded-2xl font-bold flex justify-center gap-2 hover:bg-neon-red/20 transition-colors"><Icon name="trash-2" /> Reset All Data</button></div>
                            </div>
                        )}

                        {/* ========== ANALYTICS / BREAKDOWN ========== */}
                        {view === 'breakdown' && (
                            <div className="animate-enter space-y-6">
                                <div className="flex justify-between items-center px-1">
                                    <h2 className="text-3xl font-black tracking-tight text-gradient-premium">Analytics</h2>
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => { const d = new Date(selectedMonth); d.setMonth(d.getMonth() - 1); setSelectedMonth(d); }} className="p-2 bg-glass-100 rounded-xl text-slate-400 hover:text-white border border-glass-200"><Icon name="chevron-left" size={16} /></button>
                                        <span className="text-sm font-bold text-slate-300 min-w-[100px] text-center">{selectedMonth.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</span>
                                        <button onClick={() => { const d = new Date(selectedMonth); d.setMonth(d.getMonth() + 1); setSelectedMonth(d); }} className="p-2 bg-glass-100 rounded-xl text-slate-400 hover:text-white border border-glass-200"><Icon name="chevron-right" size={16} /></button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div className="glass-card p-5 rounded-2xl">
                                        <div className="text-slate-500 text-xs font-bold uppercase mb-1">Total Spent</div>
                                        <div className="text-3xl font-black text-white">${selectedMonthTotal.toFixed(0)}</div>
                                        {monthComparison.totalChange !== 0 && (
                                            <div className={`text-xs font-bold mt-1 flex items-center gap-1 ${monthComparison.totalChange > 0 ? 'text-neon-red' : 'text-neon-green'}`}>
                                                <Icon name={monthComparison.totalChange > 0 ? 'trending-up' : 'trending-down'} size={12} />
                                                {Math.abs(monthComparison.totalChange).toFixed(0)}% vs last month
                                            </div>
                                        )}
                                    </div>
                                    <div className="glass-card p-5 rounded-2xl">
                                        <div className="text-slate-500 text-xs font-bold uppercase mb-1">Daily Average</div>
                                        <div className="text-3xl font-black text-white">${dailyAvg.toFixed(0)}</div>
                                        <div className={`text-xs font-bold mt-1 ${dailyAvg > targetDaily ? 'text-neon-red' : 'text-neon-green'}`}>Target: ${targetDaily.toFixed(0)}/day</div>
                                    </div>
                                </div>

                                {/* Donut Chart */}
                                <div className="glass-card p-6 rounded-3xl">
                                    <div className="mb-4 font-bold text-slate-300 flex items-center gap-2 text-sm uppercase tracking-wide">
                                        <Icon name="pie-chart" size={18} className="text-neon-blue" /> Where Your Money Goes
                                    </div>
                                    {categorySpending.length > 0 ? (
                                        <div className="flex flex-col md:flex-row items-center gap-6">
                                            <div className="relative w-48 h-48 flex-shrink-0">
                                                <svg viewBox="0 0 100 100" className="w-full h-full -rotate-90">
                                                    {(() => {
                                                        const colors = ['#00ff9d', '#00f0ff', '#bd00ff', '#ff0055', '#facc15', '#ec4899'];
                                                        let cumulative = 0;
                                                        return categorySpending.map((cat, i) => {
                                                            const radius = 35;
                                                            const circumference = 2 * Math.PI * radius;
                                                            const strokeLength = (cat.percentage / 100) * circumference;
                                                            const strokeOffset = (cumulative / 100) * circumference;
                                                            cumulative += cat.percentage;
                                                            return (
                                                                <circle key={cat.name} cx="50" cy="50" r={radius} fill="none" stroke={colors[i % colors.length]} strokeWidth="12"
                                                                    strokeDasharray={`${strokeLength} ${circumference - strokeLength}`} strokeDashoffset={-strokeOffset}
                                                                    className="transition-all duration-700 hover:opacity-80 cursor-pointer"
                                                                    style={{ filter: `drop-shadow(0 0 8px ${colors[i % colors.length]}40)` }}
                                                                    onClick={() => setSelectedCategory(selectedCategory === cat.name ? null : cat.name)} />
                                                            );
                                                        });
                                                    })()}
                                                </svg>
                                                <div className="absolute inset-0 flex flex-col items-center justify-center">
                                                    <span className="text-3xl font-black text-white">${selectedMonthTotal.toFixed(0)}</span>
                                                    <span className="text-xs text-slate-400 font-medium">Total</span>
                                                </div>
                                            </div>
                                            <div className="flex-1 space-y-2 w-full">
                                                {categorySpending.slice(0, 5).map((cat, i) => {
                                                    const colors = ['bg-neon-green', 'bg-neon-blue', 'bg-neon-purple', 'bg-neon-red', 'bg-yellow-400'];
                                                    const isSelected = selectedCategory === cat.name;
                                                    return (
                                                        <div key={cat.name} onClick={() => setSelectedCategory(isSelected ? null : cat.name)}
                                                            className={`flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all ${isSelected ? 'bg-glass-200 scale-[1.02]' : 'hover:bg-glass-100'}`}>
                                                            <div className="flex items-center gap-3 min-w-0 flex-1">
                                                                <div className={`w-3 h-3 rounded-full flex-shrink-0 ${colors[i % colors.length]}`}></div>
                                                                <Icon name={cat.icon} size={14} className="text-slate-400 flex-shrink-0" />
                                                                <span className="font-medium text-slate-200 text-sm truncate">{cat.name}</span>
                                                            </div>
                                                            <div className="flex items-center gap-2 flex-shrink-0 ml-3">
                                                                <span className="font-bold text-white">${cat.amount.toFixed(0)}</span>
                                                                <span className="text-slate-500 text-xs bg-glass-100 px-2 py-0.5 rounded">{cat.percentage.toFixed(0)}%</span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-center py-10">
                                            <div className="empty-float text-5xl mb-3">📊</div>
                                            <p className="text-slate-500">No spending data for this month</p>
                                        </div>
                                    )}
                                </div>

                                {/* Daily Spending Bar Chart */}
                                <div className="glass-card p-6 rounded-3xl">
                                    <div className="mb-4 flex items-center justify-between">
                                        <span className="font-bold text-slate-300 flex items-center gap-2 text-sm uppercase tracking-wide">
                                            <Icon name="bar-chart-3" size={18} className="text-neon-purple" /> Daily Spending
                                        </span>
                                        <div className="flex gap-1 bg-glass-100 rounded-lg p-1">
                                            {[7, 14, 30].map(range => (
                                                <button key={range} onClick={() => setChartRange(range)}
                                                    className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${chartRange === range ? 'bg-neon-purple text-black' : 'text-slate-400 hover:text-white'}`}>{range}D</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="text-xs text-slate-500 mb-3 flex justify-between">
                                        <span>Avg: <span className="text-white font-bold">${dailySpendingData.avg.toFixed(0)}</span>/day</span>
                                        <span>Max: <span className="text-neon-red font-bold">${dailySpendingData.max.toFixed(0)}</span></span>
                                    </div>
                                    <div className={`flex items-end justify-between h-32 gap-0.5 ${chartRange === 30 ? 'overflow-x-auto pb-1' : ''}`}>
                                        {dailySpendingData.days.map((d, i) => {
                                            const isToday = i === dailySpendingData.days.length - 1;
                                            const barColor = d.isAboveAvg ? 'bg-neon-red' : 'bg-neon-green';
                                            const showLabel = chartRange <= 14 || (chartRange === 30 && (i === 0 || (i + 1) % 7 === 0 || isToday));
                                            return (
                                                <div key={i} className={`flex flex-col items-center gap-1 flex-1 group relative ${chartRange === 30 ? 'min-w-[10px]' : 'min-w-[12px]'}`}>
                                                    <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-black/90 px-2 py-1 rounded text-[10px] font-bold text-white opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10">${d.total.toFixed(0)}</div>
                                                    <div className="w-full relative h-24 flex items-end">
                                                        <div className={`w-full rounded-t transition-all duration-500 ${barColor} ${isToday ? 'shadow-[0_0_15px_currentColor]' : ''}`}
                                                            style={{ height: `${Math.max(d.pct, d.total > 0 ? 8 : 4)}%`, opacity: isToday ? 1 : 0.7 }}></div>
                                                    </div>
                                                    {showLabel && (
                                                        <span className={`text-[7px] font-bold ${isToday ? 'text-white' : chartRange === 30 ? 'text-slate-500' : 'text-slate-600'}`}>{d.dayNum}</span>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Smart Insights */}
                                <div className="glass-card p-5 rounded-3xl">
                                    <div className="mb-3 font-bold text-slate-300 flex items-center gap-2 text-sm uppercase tracking-wide">
                                        <Icon name="sparkles" size={18} className="text-yellow-400" /> Smart Insights
                                    </div>
                                    <div className="space-y-2">
                                        {spendingInsights.map((insight, i) => (
                                            <div key={i} className={`flex items-start gap-3 p-3 bg-glass-100 rounded-xl ${insight.color}`}>
                                                <Icon name={insight.icon} size={16} className="mt-0.5 flex-shrink-0" />
                                                <span className="text-sm text-slate-300">{insight.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={handleReportCard}
                                        className="w-full mt-4 p-3 bg-glass-100 hover:bg-neon-purple/20 rounded-xl text-neon-purple font-bold text-sm flex items-center justify-center gap-2 border border-neon-purple/30 transition-all">
                                        <Icon name="brain" size={16} /> Get AI Deep Analysis
                                    </button>
                                </div>

                                {/* Month Comparison */}
                                {monthComparison.categories.length > 0 && (
                                    <div className="glass-card p-5 rounded-3xl">
                                        <div className="mb-4 font-bold text-slate-300 flex items-center justify-between text-sm uppercase tracking-wide">
                                            <span className="flex items-center gap-2"><Icon name="git-compare" size={18} className="text-neon-green" /> vs Last Month</span>
                                            <span className={`text-xs normal-case ${monthComparison.totalChange > 0 ? 'text-neon-red' : 'text-neon-green'}`}>
                                                {monthComparison.totalChange > 0 ? '+' : ''}{monthComparison.totalChange.toFixed(0)}% overall
                                            </span>
                                        </div>
                                        <div className="space-y-2">
                                            {monthComparison.categories.slice(0, 5).map(cat => (
                                                <div key={cat.name} className="flex items-center justify-between p-3 bg-glass-100 rounded-xl">
                                                    <div className="flex items-center gap-3">
                                                        <Icon name={cat.icon} size={16} className="text-slate-400" />
                                                        <span className="text-sm font-medium text-slate-300">{cat.name}</span>
                                                    </div>
                                                    <div className="flex items-center gap-3 text-sm">
                                                        <span className="text-slate-500">${cat.previous.toFixed(0)}</span>
                                                        <Icon name="arrow-right" size={12} className="text-slate-600" />
                                                        <span className="font-bold text-white">${cat.current.toFixed(0)}</span>
                                                        <span className={`text-xs font-bold px-2 py-0.5 rounded ${cat.change > 0 ? 'bg-neon-red/20 text-neon-red' : 'bg-neon-green/20 text-neon-green'}`}>
                                                            {cat.change > 0 ? '+' : ''}{cat.change.toFixed(0)}%
                                                        </span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Monthly History */}
                                {monthlyBreakdown.length > 0 && (
                                    <div className="space-y-4">
                                        <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wide px-1">Monthly History</h3>
                                        {monthlyBreakdown.slice(0, 3).map(([month, data]) => (
                                            <div key={month} className="glass-card rounded-2xl overflow-hidden">
                                                <div className="p-4 bg-white/5 border-b border-white/5 flex justify-between items-center">
                                                    <span className="font-bold text-slate-200">{month}</span>
                                                    <span className="bg-neon-purple/20 text-purple-300 px-3 py-1 rounded-full text-sm">${data.total.toFixed(0)}</span>
                                                </div>
                                                <div className="p-2">
                                                    {Object.entries(data.cats).sort((a, b) => b[1] - a[1]).slice(0, 4).map(([c, amt]) => (
                                                        <div key={c} className="flex justify-between items-center p-2 text-sm">
                                                            <span className="text-slate-400">{c}</span>
                                                            <span className="font-bold text-slate-200">${amt.toFixed(0)}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* ========== MODALS ========== */}

                    {/* New Category Modal */}
                    {showAddCat && (<div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 backdrop-blur-xl animate-enter"><div className="bg-glass-nav border border-glass-200 rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl"><h2 className="text-2xl font-black mb-6 text-white text-center">New Envelope</h2><div className="space-y-4"><input type="text" placeholder="Name (e.g. Pets)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white outline-none focus:border-neon-purple" value={newCatForm.name} onChange={e => setNewCatForm({ ...newCatForm, name: e.target.value })} /><input type="number" placeholder="Limit ($)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white outline-none focus:border-neon-purple" value={newCatForm.limit} onChange={e => setNewCatForm({ ...newCatForm, limit: e.target.value })} /><div className="grid grid-cols-5 gap-2 my-4">{AVAILABLE_ICONS.map(ic => (<button key={ic} onClick={() => setNewCatForm({ ...newCatForm, icon: ic })} className={`p-3 rounded-xl flex justify-center transition-all ${newCatForm.icon === ic ? 'bg-neon-purple text-white shadow-lg' : 'bg-glass-100 text-slate-500'}`}><Icon name={ic} size={18} /></button>))}</div><div className="flex gap-2 mb-4">{['weekly', 'monthly'].map(f => (<button key={f} onClick={() => setNewCatForm({ ...newCatForm, frequency: f })} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${newCatForm.frequency === f ? 'bg-neon-purple text-white' : 'bg-glass-100 text-slate-500'}`}>{f.charAt(0).toUpperCase() + f.slice(1)}</button>))}</div><div className="flex gap-3"><button onClick={() => setShowAddCat(false)} className="flex-1 py-4 text-slate-500 font-bold hover:bg-glass-100 rounded-2xl">Cancel</button><button onClick={handleCreateCategory} disabled={!newCatForm.name || !newCatForm.limit} className="flex-1 py-4 bg-neon-purple text-white rounded-2xl font-bold shadow-lg disabled:opacity-50">Create</button></div></div></div></div>)}

                    {/* Cycle Info Modal */}
                    {showCycleInfo && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-6 backdrop-blur-sm animate-enter">
                            <div className="bg-glass-nav border border-white/10 rounded-[2rem] p-6 w-full max-w-sm shadow-2xl max-h-[80vh] overflow-y-auto">
                                <h2 className="text-2xl font-black mb-2 text-white flex items-center gap-2">
                                    <Icon name="refresh-cw" size={20} className="text-neon-purple" /> Cycle {weeksTracked}
                                </h2>
                                <p className="text-slate-400 mb-4 text-sm">Auto-renews every Sunday at midnight</p>

                                {/* Cycle Progress */}
                                <div className="bg-glass-100 p-4 rounded-2xl mb-4 border border-glass-200">
                                    <div className="flex justify-between text-sm mb-2">
                                        <span className="text-slate-400">Progress</span>
                                        <span className="text-white font-bold">{cycleTotalDays - cycleDaysLeft} of {cycleTotalDays} days</span>
                                    </div>
                                    <div className="w-full h-2 bg-black/40 rounded-full overflow-hidden">
                                        <div className="h-full bg-gradient-to-r from-neon-purple to-neon-blue rounded-full transition-all duration-500" style={{ width: `${cycleProgress}%` }}></div>
                                    </div>
                                    <div className="flex justify-between text-xs text-slate-500 mt-2">
                                        <span>{cycleStartDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
                                        <span>{cycleEnd.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
                                    </div>
                                </div>

                                {/* Countdown */}
                                <div className="bg-neon-purple/10 p-4 rounded-2xl mb-4 border border-neon-purple/20 text-center">
                                    <span className="text-xs text-neon-purple font-bold uppercase tracking-wider block mb-1">Time Until Auto-Renewal</span>
                                    <span className="text-3xl font-black text-white countdown-pulse">{formatCountdown(cycleTimeLeft)}</span>
                                </div>

                                {/* Current Cycle Rollover Preview */}
                                <div className="mb-4">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">Rollover Preview</h3>
                                    <div className="space-y-2">
                                        {categories.filter(c => c.frequency === 'weekly').map(cat => {
                                            const maxRollover = cat.limit * 0.5;
                                            const rollover = cat.balance < 0 ? cat.balance : Math.min(cat.balance, maxRollover);
                                            const newBalance = cat.limit + rollover;
                                            return (
                                                <div key={cat.id} className="bg-glass-100 p-3 rounded-xl flex justify-between items-center">
                                                    <div className="flex items-center gap-2">
                                                        <Icon name={cat.icon} size={16} className="text-slate-400" />
                                                        <span className="text-sm font-medium text-slate-300">{cat.name}</span>
                                                    </div>
                                                    <div className="text-right text-xs">
                                                        <span className={rollover >= 0 ? 'text-neon-green' : 'text-neon-red'}>{rollover >= 0 ? '+' : ''}{rollover.toFixed(0)}</span>
                                                        <span className="text-slate-500 mx-1">→</span>
                                                        <span className="text-white font-bold">${newBalance.toFixed(0)}</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <button onClick={() => setShowCycleInfo(false)} className="w-full py-4 font-bold text-slate-400 bg-glass-100 rounded-2xl hover:bg-glass-200">Close</button>
                            </div>
                        </div>
                    )}

                    {/* Add Goal Modal */}
                    {showAddGoal && (
                        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 backdrop-blur-xl animate-enter">
                            <div className="bg-glass-nav border border-neon-green/50 rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl">
                                <h2 className="text-2xl font-black mb-6 text-white text-center">New Goal</h2>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Goal Name (e.g. Vacation)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-green outline-none" value={newGoalForm.name} onChange={e => setNewGoalForm({ ...newGoalForm, name: e.target.value })} />
                                    <input type="number" placeholder="Target Amount ($)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-green outline-none" value={newGoalForm.target} onChange={e => setNewGoalForm({ ...newGoalForm, target: e.target.value })} />
                                    <div className="grid grid-cols-5 gap-2">{AVAILABLE_ICONS.slice(0, 5).map(ic => <button key={ic} onClick={() => setNewGoalForm({ ...newGoalForm, icon: ic })} className={`p-3 rounded-xl flex justify-center ${newGoalForm.icon === ic ? 'bg-neon-green text-black' : 'bg-glass-100 text-slate-500'}`}><Icon name={ic} size={18} /></button>)}</div>
                                    <div className="flex gap-2 mb-4">{['#00ff9d', '#00f0ff', '#bd00ff', '#ff0055', '#facc15'].map(c => <button key={c} onClick={() => setNewGoalForm({ ...newGoalForm, color: c })} className={`w-8 h-8 rounded-full ${newGoalForm.color === c ? 'ring-2 ring-white scale-110' : ''}`} style={{ backgroundColor: c }}></button>)}</div>
                                    <div className="flex gap-3"><button onClick={() => setShowAddGoal(false)} className="flex-1 py-4 text-slate-500 font-bold bg-glass-100 rounded-2xl">Cancel</button><button onClick={handleCreateGoal} className="flex-1 py-4 bg-neon-green text-black font-bold rounded-2xl shadow-lg">Save</button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Sub Modal */}
                    {showAddSub && (
                        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 backdrop-blur-xl animate-enter">
                            <div className="bg-glass-nav border border-neon-purple/50 rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl">
                                <h2 className="text-2xl font-black mb-6 text-white text-center">New Subscription</h2>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Name (e.g. Netflix)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-purple outline-none" value={newSubForm.name} onChange={e => setNewSubForm({ ...newSubForm, name: e.target.value })} />
                                    <input type="number" placeholder="Cost ($)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-purple outline-none" value={newSubForm.amount} onChange={e => setNewSubForm({ ...newSubForm, amount: e.target.value })} />
                                    <select className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-purple outline-none" value={newSubForm.frequency} onChange={e => setNewSubForm({ ...newSubForm, frequency: e.target.value })}><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select>
                                    <div className="flex gap-3"><button onClick={() => setShowAddSub(false)} className="flex-1 py-4 text-slate-500 font-bold bg-glass-100 rounded-2xl">Cancel</button><button onClick={handleCreateSub} className="flex-1 py-4 bg-neon-purple text-white font-bold rounded-2xl shadow-lg">Save</button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Net Worth Modal */}
                    {showAddNetWorth && (
                        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 backdrop-blur-xl animate-enter">
                            <div className="bg-glass-nav border border-neon-blue/50 rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl">
                                <h2 className="text-2xl font-black mb-6 text-white text-center">Add Asset / Liability</h2>
                                <div className="space-y-4">
                                    <div className="flex gap-2"><button onClick={() => setNewNWForm({ ...newNWForm, type: 'asset' })} className={`flex-1 py-3 rounded-xl font-bold ${newNWForm.type === 'asset' ? 'bg-neon-green text-black' : 'bg-glass-100 text-slate-500'}`}>Asset</button><button onClick={() => setNewNWForm({ ...newNWForm, type: 'liability' })} className={`flex-1 py-3 rounded-xl font-bold ${newNWForm.type === 'liability' ? 'bg-neon-red text-white' : 'bg-glass-100 text-slate-500'}`}>Liability</button></div>
                                    <input type="text" placeholder="Name (e.g. Car Loan)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-blue outline-none" value={newNWForm.name} onChange={e => setNewNWForm({ ...newNWForm, name: e.target.value })} />
                                    <input type="number" placeholder="Amount ($)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-blue outline-none" value={newNWForm.amount} onChange={e => setNewNWForm({ ...newNWForm, amount: e.target.value })} />
                                    <div className="flex gap-3"><button onClick={() => setShowAddNetWorth(false)} className="flex-1 py-4 text-slate-500 font-bold bg-glass-100 rounded-2xl">Cancel</button><button onClick={handleCreateNW} className="flex-1 py-4 bg-neon-blue text-black font-bold rounded-2xl shadow-lg">Save</button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Wishlist Modal */}
                    {showAddWish && (
                        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 backdrop-blur-xl animate-enter">
                            <div className="bg-glass-nav border border-white/20 rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl">
                                <h2 className="text-2xl font-black mb-6 text-white text-center">Add to Wishlist</h2>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Item Name" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-white outline-none" value={newWishForm.name} onChange={e => setNewWishForm({ ...newWishForm, name: e.target.value })} />
                                    <input type="number" placeholder="Price ($)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-white outline-none" value={newWishForm.price} onChange={e => setNewWishForm({ ...newWishForm, price: e.target.value })} />
                                    <input type="text" placeholder="URL (optional)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-white outline-none" value={newWishForm.url} onChange={e => setNewWishForm({ ...newWishForm, url: e.target.value })} />
                                    <select className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-white outline-none" value={newWishForm.priority} onChange={e => setNewWishForm({ ...newWishForm, priority: e.target.value })}><option value="high">High Priority</option><option value="medium">Medium Priority</option><option value="low">Low Priority</option></select>
                                    <div className="flex gap-3"><button onClick={() => setShowAddWish(false)} className="flex-1 py-4 text-slate-500 font-bold bg-glass-100 rounded-2xl">Cancel</button><button onClick={handleCreateWish} className="flex-1 py-4 bg-white text-black font-bold rounded-2xl shadow-lg">Save</button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Bill Modal */}
                    {showAddBill && (
                        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 backdrop-blur-xl animate-enter">
                            <div className="bg-glass-nav border border-neon-amber/50 rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl">
                                <h2 className="text-2xl font-black mb-6 text-white text-center">New Bill Reminder</h2>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Bill Name (e.g. Rent)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-amber outline-none" value={newBillForm.name} onChange={e => setNewBillForm({ ...newBillForm, name: e.target.value })} />
                                    <input type="number" placeholder="Amount ($)" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-amber outline-none" value={newBillForm.amount} onChange={e => setNewBillForm({ ...newBillForm, amount: e.target.value })} />
                                    <input type="number" placeholder="Due Day of Month (1-31)" min="1" max="31" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-amber outline-none" value={newBillForm.dueDay} onChange={e => setNewBillForm({ ...newBillForm, dueDay: e.target.value })} />
                                    <div className="flex gap-3"><button onClick={() => setShowAddBill(false)} className="flex-1 py-4 text-slate-500 font-bold bg-glass-100 rounded-2xl">Cancel</button><button onClick={handleCreateBill} className="flex-1 py-4 bg-neon-amber text-black font-bold rounded-2xl shadow-lg">Save</button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Split Tx Modal */}
                    {showSplitTx && (
                        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 backdrop-blur-xl animate-enter">
                            <div className="bg-glass-nav border border-white/20 rounded-[2.5rem] p-6 w-full max-w-md shadow-2xl max-h-[90vh] overflow-y-auto">
                                <h2 className="text-2xl font-black mb-6 text-white text-center">Split Transaction</h2>
                                <input type="text" placeholder="Receipt Name (e.g. Walmart)" className="w-full mb-4 p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white outline-none" value={splitTotalLabel} onChange={e => setSplitTotalLabel(e.target.value)} />
                                <div className="space-y-3 mb-6">
                                    {splitParts.map((part, i) => (
                                        <div key={i} className="flex gap-2">
                                            <select className="flex-1 p-3 bg-black/50 border border-glass-200 rounded-xl font-bold text-sm text-white outline-none" value={part.categoryId} onChange={e => { const n = [...splitParts]; n[i].categoryId = e.target.value; setSplitParts(n); }}>
                                                <option value="">Category...</option>
                                                {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                            </select>
                                            <input type="number" placeholder="$" className="w-24 p-3 bg-black/50 border border-glass-200 rounded-xl font-bold text-sm text-white outline-none text-center" value={part.amount} onChange={e => { const n = [...splitParts]; n[i].amount = e.target.value; setSplitParts(n); }} />
                                            {i > 0 && <button onClick={() => { const n = [...splitParts]; n.splice(i, 1); setSplitParts(n); }} className="p-3 text-neon-red bg-neon-red/10 rounded-xl"><Icon name="trash-2" size={16} /></button>}
                                        </div>
                                    ))}
                                    <button onClick={() => setSplitParts([...splitParts, { categoryId: '', amount: '', description: '' }])} className="w-full py-2 border border-dashed border-glass-200 text-slate-400 font-bold rounded-xl hover:bg-glass-100">+ Add Split</button>
                                </div>
                                <div className="flex gap-3"><button onClick={() => { setShowSplitTx(false); setSplitParts([{ categoryId: '', amount: '', description: '' }]); }} className="flex-1 py-4 text-slate-500 font-bold bg-glass-100 rounded-2xl">Cancel</button><button onClick={handleSplitTransaction} className="flex-1 py-4 bg-white text-black font-bold rounded-2xl shadow-lg">Save Splits</button></div>
                            </div>
                        </div>
                    )}

                    {/* Edit Transaction Modal */}
                    {quickEntry.open && (
                        <div className="fixed inset-0 bg-black/70 z-[75] flex items-end sm:items-center justify-center p-3 sm:p-6 backdrop-blur-sm animate-enter" role="dialog" aria-modal="true" aria-label="Quick transaction">
                            <form onSubmit={saveQuickEntry} className="modal-surface w-full max-w-md rounded-2xl p-5 sm:p-6 space-y-4">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-[10px] uppercase tracking-widest text-slate-500 font-black">Quick entry</p>
                                        <h2 className="text-xl font-black text-white mt-1">Add {quickEntry.type === 'expense' ? 'expense' : 'income'}</h2>
                                    </div>
                                    <button type="button" onClick={() => setQuickEntry({ ...quickEntry, open: false })} className="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-white/10" aria-label="Close quick entry"><Icon name="x" size={18} /></button>
                                </div>
                                <div className="grid grid-cols-2 rounded-xl bg-black/25 p-1 border border-white/10">
                                    <button type="button" onClick={() => setQuickEntry({ ...quickEntry, type: 'expense' })} className={`py-3 rounded-lg text-sm font-black ${quickEntry.type === 'expense' ? 'bg-rose-400 text-slate-950' : 'text-slate-400'}`}>Expense</button>
                                    <button type="button" onClick={() => setQuickEntry({ ...quickEntry, type: 'income' })} className={`py-3 rounded-lg text-sm font-black ${quickEntry.type === 'income' ? 'bg-emerald-300 text-slate-950' : 'text-slate-400'}`}>Income</button>
                                </div>
                                <select value={quickEntry.categoryId} onChange={e => setQuickEntry({ ...quickEntry, categoryId: e.target.value })} className="w-full p-4 rounded-xl text-sm font-bold">
                                    <option value="">Choose category</option>
                                    {categories.map(category => <option key={category.id} value={category.id}>{category.name}</option>)}
                                </select>
                                <input autoFocus inputMode="decimal" type="number" min="0.01" step="0.01" value={quickEntry.amount} onChange={e => setQuickEntry({ ...quickEntry, amount: e.target.value })} placeholder="Amount" className="w-full p-4 rounded-xl text-2xl font-black" />
                                <input type="text" value={quickEntry.description} onChange={e => setQuickEntry({ ...quickEntry, description: e.target.value })} placeholder="What was this for? (optional)" className="w-full p-4 rounded-xl text-sm font-semibold" />
                                <div className="grid grid-cols-4 gap-2">
                                    {[10, 25, 50, 100].map(amount => <button type="button" key={amount} onClick={() => setQuickEntry({ ...quickEntry, amount: String(amount) })} className="py-2.5 rounded-lg bg-white/5 border border-white/10 text-xs font-black text-slate-300 hover:bg-white/10">${amount}</button>)}
                                </div>
                                <button type="submit" className={`w-full py-4 rounded-xl text-sm font-black ${quickEntry.type === 'expense' ? 'bg-rose-400 text-slate-950' : 'bg-emerald-300 text-slate-950'}`}>Save transaction</button>
                                <button type="button" onClick={() => { setQuickEntry({ ...quickEntry, open: false }); setView('add'); }} className="w-full py-2 text-xs font-bold text-slate-400 hover:text-white">Open full editor</button>
                            </form>
                        </div>
                    )}

                    {editingTx && (
                        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 backdrop-blur-xl animate-enter">
                            <form onSubmit={handleSaveTransactionEdit} className="bg-glass-nav border border-neon-green/40 rounded-[2rem] p-6 w-full max-w-md shadow-2xl space-y-4">
                                <div className="flex items-center justify-between">
                                    <h2 className="text-2xl font-black text-white">Edit Transaction</h2>
                                    <button type="button" onClick={() => setEditingTx(null)} className="p-2 text-slate-500 hover:text-white"><Icon name="x" size={18} /></button>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button type="button" onClick={() => setEditTxForm({ ...editTxForm, type: 'expense' })} className={`py-3 rounded-xl font-bold ${editTxForm.type === 'expense' ? 'bg-neon-red text-white' : 'bg-glass-100 text-slate-500'}`}>Expense</button>
                                    <button type="button" onClick={() => setEditTxForm({ ...editTxForm, type: 'income' })} className={`py-3 rounded-xl font-bold ${editTxForm.type === 'income' ? 'bg-neon-green text-black' : 'bg-glass-100 text-slate-500'}`}>Income</button>
                                </div>
                                <select value={editTxForm.categoryId} onChange={e => setEditTxForm({ ...editTxForm, categoryId: e.target.value })} className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white outline-none">
                                    {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                                <input type="number" step="0.01" value={editTxForm.amount} onChange={e => setEditTxForm({ ...editTxForm, amount: e.target.value })} placeholder="Amount" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white outline-none" />
                                <input type="text" value={editTxForm.description} onChange={e => setEditTxForm({ ...editTxForm, description: e.target.value })} placeholder="Description" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white outline-none" />
                                <input type="date" value={editTxForm.date} onChange={e => setEditTxForm({ ...editTxForm, date: e.target.value })} className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white outline-none" />
                                <input type="text" value={editTxForm.tagsText} onChange={e => setEditTxForm({ ...editTxForm, tagsText: e.target.value })} placeholder="Tags, comma separated" className="w-full p-4 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white outline-none" />
                                <div className="flex gap-3 pt-2">
                                    <button type="button" onClick={() => setEditingTx(null)} className="flex-1 py-4 font-bold text-slate-400 bg-glass-100 rounded-2xl">Cancel</button>
                                    <button type="submit" className="flex-1 py-4 font-bold text-black bg-neon-green rounded-2xl shadow-xl">Save</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* App Confirmation */}
                    {confirmAction && (
                        <div className="fixed inset-0 bg-black/90 z-[75] flex items-center justify-center p-6 backdrop-blur-xl animate-enter">
                            <div className="modal-surface rounded-2xl p-6 w-full max-w-sm">
                                <h2 className="text-2xl font-black text-white mb-2">{confirmAction.title}</h2>
                                <p className="text-slate-400 text-sm mb-6 leading-relaxed">{confirmAction.message}</p>
                                <div className="flex gap-3">
                                    <button disabled={isConfirming} onClick={() => setConfirmAction(null)} className="flex-1 py-4 font-bold text-slate-400 bg-glass-100 rounded-xl hover:bg-glass-200">Cancel</button>
                                    <button disabled={isConfirming} onClick={runConfirmAction} className="flex-1 py-4 font-bold text-white bg-rose-400 rounded-xl transition-colors">{isConfirming ? 'Working...' : confirmAction.confirmLabel}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Reset Confirmation */}
                    {showResetConfirm && (
                        <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 backdrop-blur-xl animate-enter">
                            <div className="bg-glass-nav border border-neon-red/30 rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl">
                                <h2 className="text-2xl font-black text-white mb-2">Reset Everything?</h2>
                                <p className="text-slate-400 text-sm mb-6">This will delete all transactions, reset all categories, and clear cycle history. This cannot be undone.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-4 font-bold text-slate-400 bg-glass-100 rounded-2xl hover:bg-glass-200">Cancel</button>
                                    <button onClick={performReset} className="flex-1 py-4 font-bold text-white bg-neon-red rounded-2xl shadow-xl hover:bg-red-500 transition-all">Reset</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-5 left-0 right-0 flex justify-center z-40 pointer-events-none no-print px-3">
                        <nav className="glass-nav bottom-nav flex pointer-events-auto transition-all shadow-2xl">
                            <button onClick={() => setView('dashboard')} className={`flex flex-col items-center justify-center px-3 py-2 transition-all duration-200 ${view === 'dashboard' ? 'bg-emerald-400/15 text-emerald-200 border border-emerald-300/20' : 'text-slate-500 hover:text-slate-300 hover:bg-white/[0.045]'}`}><Icon name="layout-dashboard" size={20} /><span>Home</span></button>
                            <button onClick={() => setView('breakdown')} className={`flex flex-col items-center justify-center px-3 py-2 transition-all duration-200 ${view === 'breakdown' ? 'bg-cyan-400/15 text-cyan-200 border border-cyan-300/20' : 'text-slate-500 hover:text-slate-300 hover:bg-white/[0.045]'}`}><Icon name="pie-chart" size={20} /><span>Stats</span></button>
                            <button onClick={() => setView('add')} className={`flex flex-col items-center justify-center px-3 py-2 transition-all duration-200 ${view === 'add' ? 'bg-white text-black' : 'bg-white/10 text-white hover:bg-white/15'}`}><Icon name="plus" size={22} strokeWidth={3} /><span>Add</span></button>
                            <button onClick={() => setView('history')} className={`flex flex-col items-center justify-center px-3 py-2 transition-all duration-200 ${view === 'history' ? 'bg-rose-400/15 text-rose-200 border border-rose-300/20' : 'text-slate-500 hover:text-slate-300 hover:bg-white/[0.045]'}`}><Icon name="history" size={20} /><span>Log</span></button>
                            <button onClick={() => setView('settings')} className={`flex flex-col items-center justify-center px-3 py-2 transition-all duration-200 ${view === 'settings' ? 'bg-slate-200/10 text-white border border-white/15' : 'text-slate-500 hover:text-slate-300 hover:bg-white/[0.045]'}`}><Icon name="settings" size={20} /><span>Tools</span></button>
                        </nav>
                    </div>

                    {/* Toast Notification */}
                    <div className={`toast ${toast.show ? 'show' : ''} ${toast.error ? 'error' : ''} ${toast.type === 'cycle' ? 'cycle' : ''}`}>
                        <span>{toast.message}</span>
                        {toast.actionLabel && (
                            <button onClick={() => { const action = toast.onAction; setToast({ show: false, message: '', error: false, type: '' }); if (action) action(); }} className="ml-3 px-3 py-1 rounded-full bg-black/20 text-current text-xs font-black border border-current/20">
                                {toast.actionLabel}
                            </button>
                        )}
                    </div>

                    {/* Confetti Celebration */}
                    {showConfetti && (
                        <div className="confetti-container">
                            {[...Array(30)].map((_, i) => (
                                <div key={i} className="confetti"
                                    style={{
                                        left: `${Math.random() * 100}%`,
                                        backgroundColor: ['#00ff9d', '#00f0ff', '#bd00ff', '#ff0055', '#facc15'][Math.floor(Math.random() * 5)],
                                        animationDelay: `${Math.random() * 0.5}s`,
                                        borderRadius: Math.random() > 0.5 ? '50%' : '0'
                                    }} />
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
