    <style>
        :root {
            --app-bg: #070a0f;
            --app-bg-soft: #0b1018;
            --panel: rgba(18, 24, 34, 0.78);
            --panel-soft: rgba(255, 255, 255, 0.055);
            --panel-hover: rgba(255, 255, 255, 0.085);
            --border: rgba(148, 163, 184, 0.16);
            --border-strong: rgba(226, 232, 240, 0.22);
            --text: #eef4f8;
            --muted: #94a3b8;
            --muted-soft: #64748b;
            --accent: #34d399;
            --accent-2: #38bdf8;
            --danger: #fb7185;
            --warning: #fbbf24;
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --shadow-panel: 0 18px 60px rgba(0, 0, 0, 0.38), inset 0 1px rgba(255, 255, 255, 0.045);
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.28);
        }

        body {
            background:
                radial-gradient(circle at 18% 0%, rgba(52, 211, 153, 0.10), transparent 28%),
                radial-gradient(circle at 88% 8%, rgba(56, 189, 248, 0.08), transparent 30%),
                linear-gradient(180deg, var(--app-bg) 0%, var(--app-bg-soft) 52%, #06080c 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            letter-spacing: 0;
        }

        #root {
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 10;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.25);
            border: 3px solid transparent;
            border-radius: 999px;
            background-clip: padding-box;
        }

        /* Enhanced Liquid Background with Aurora */
        .liquid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(circle at 15% 15%, rgba(52, 211, 153, 0.10), transparent 34%),
                radial-gradient(circle at 82% 22%, rgba(56, 189, 248, 0.08), transparent 32%);
            pointer-events: none;
            opacity: 0.8;
        }

        @keyframes auroraShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Enhanced Orbs with Depth */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(110px);
            opacity: 0.16;
            animation: blob 36s infinite alternate;
            will-change: transform;
        }

        .orb-1 {
            top: -10%;
            left: -10%;
            width: 42vw;
            height: 42vw;
            background: radial-gradient(circle, #34d399 0%, transparent 72%);
            mix-blend-mode: screen;
        }

        .orb-2 {
            top: 30%;
            right: -20%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, #38bdf8 0%, transparent 72%);
            animation-delay: -5s;
            mix-blend-mode: screen;
        }

        .orb-3 {
            bottom: -10%;
            left: 20%;
            width: 48vw;
            height: 48vw;
            background: radial-gradient(circle, #6366f1 0%, transparent 76%);
            animation-delay: -10s;
            mix-blend-mode: screen;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
            50% { transform: translateY(-30px) translateX(10px); opacity: 0.6; }
        }

        /* Glassmorphism 2.0 Premium */
        .glass-card {
            background: var(--panel);
            backdrop-filter: blur(26px) saturate(145%);
            -webkit-backdrop-filter: blur(26px) saturate(145%);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-panel);
            position: relative;
            overflow: hidden;
            transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
        }

        .glass-card:hover {
            border-color: var(--border-strong);
            background: rgba(22, 29, 40, 0.84);
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.42), inset 0 1px rgba(255, 255, 255, 0.055);
            transform: translateY(-1px);
        }

        .glass-card:active {
            transform: translateY(0) scale(0.98);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent 44%);
            transition: opacity 0.2s ease;
            opacity: 0.45;
        }

        .glass-card:hover::before {
            left: 0;
            opacity: 0.7;
        }

        .glass-nav {
            background: rgba(10, 15, 24, 0.86);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid var(--border);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.34), inset 0 1px rgba(255, 255, 255, 0.055);
        }

        /* Enhanced Inputs */
        input, select {
            background: rgba(255, 255, 255, 0.055);
            border: 1px solid rgba(148, 163, 184, 0.16);
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        input:focus, select:focus {
            border-color: rgba(52, 211, 153, 0.55);
            box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.10);
            outline: none;
            background: rgba(255, 255, 255, 0.075);
        }

        /* Advanced Animations */
        .animate-enter {
            animation: slideUpFade 0.32s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .card-appear {
            animation: cardAppear 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes cardAppear {
            from { transform: scale(0.98); }
            to { transform: scale(1); }
        }

        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.1s; }
        .stagger-3 { animation-delay: 0.15s; }
        .stagger-4 { animation-delay: 0.2s; }

        .tap-feedback:active {
            animation: springBounce 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes springBounce {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .shimmer-bg {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 10px currentColor; opacity: 1; }
            50% { box-shadow: 0 0 20px currentColor; opacity: 0.8; }
        }

        .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }

        .text-gradient-premium {
            background: linear-gradient(180deg, #f8fafc 0%, #a8b3c4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @keyframes blob {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .text-glow { text-shadow: none; }

        @keyframes gradientRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .gradient-animate {
            background-size: 200% 200%;
            animation: gradientRotate 3s ease infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px currentColor; }
            50% { box-shadow: 0 0 20px currentColor, 0 0 30px currentColor; }
        }

        .animate-glow { animation: glow 2s ease-in-out infinite; }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-bounce-in { animation: bounceIn 0.4s ease-out forwards; }

        .progress-striped {
            background-image: linear-gradient(45deg, rgba(255, 255, 255, .1) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, .1) 50%, rgba(255, 255, 255, .1) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
        }

        @keyframes countdownPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .countdown-pulse { animation: countdownPulse 2s ease-in-out infinite; }

        @keyframes streakFlame {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-3deg); }
            75% { transform: scale(1.1) rotate(3deg); }
        }

        .streak-flame { animation: streakFlame 1.5s ease-in-out infinite; }

        @keyframes cycleRenewBanner {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { transform: translateY(0); opacity: 1; }
            90% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100%); opacity: 0; }
        }

        .cycle-renew-banner { animation: cycleRenewBanner 4s ease-in-out forwards; }

        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-weight: bold;
            background: black;
            transition: opacity 0.5s;
            flex-direction: column;
            gap: 10px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(16, 24, 34, 0.96);
            color: var(--text);
            padding: 12px 18px;
            border-radius: 18px;
            font-weight: bold;
            font-size: 14px;
            z-index: 100;
            opacity: 0;
            border: 1px solid var(--border);
            transition: all 0.28s ease;
            box-shadow: var(--shadow-soft);
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { background: rgba(127, 29, 29, 0.96); color: white; box-shadow: var(--shadow-soft); }
        .toast.cycle { background: rgba(30, 41, 59, 0.96); color: white; box-shadow: var(--shadow-soft); }

        /* Confetti Container */
        .confetti-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 200; overflow: hidden;
        }

        .confetti {
            position: absolute; width: 10px; height: 10px;
            animation: confettiFall 3s ease-out forwards;
        }

        /* Floating Action Button Pulse */
        .fab-pulse { animation: fabPulse 2s ease-in-out infinite; }

        @keyframes fabPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.4); }
            50% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.6), 0 0 80px rgba(255, 255, 255, 0.3); }
        }

        @keyframes emptyFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-float { animation: emptyFloat 3s ease-in-out infinite; }

        /* Sparkline */
        .sparkline-container { height: 24px; display: flex; align-items: flex-end; gap: 1px; }
        .sparkline-bar { flex: 1; min-width: 3px; border-radius: 1px 1px 0 0; transition: height 0.3s; }

        .app-shell {
            width: min(100%, 760px);
        }

        .premium-hero {
            background:
                linear-gradient(145deg, rgba(20, 28, 40, 0.94), rgba(12, 18, 28, 0.88)),
                radial-gradient(circle at 82% 0%, rgba(52, 211, 153, 0.12), transparent 42%);
        }

        .premium-metric {
            min-height: 126px;
        }

        .premium-toolbar {
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 20px;
        }

        .bottom-nav {
            border-radius: 24px;
            padding: 8px;
            gap: 4px;
        }

        .bottom-nav button {
            min-width: 58px;
            min-height: 54px;
            border-radius: 18px !important;
            box-shadow: none;
        }

        .bottom-nav button span {
            font-size: 10px;
            line-height: 1;
            margin-top: 4px;
        }

        button {
            box-shadow: none;
            letter-spacing: 0;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .bg-glass-100 { background-color: var(--panel-soft) !important; }
        .bg-glass-200 { background-color: var(--panel-hover) !important; }
        .border-glass-100, .border-glass-200 { border-color: var(--border) !important; }
        .text-neon-green { color: #6ee7b7 !important; }
        .text-neon-blue { color: #7dd3fc !important; }
        .text-neon-purple { color: #c4b5fd !important; }
        .text-neon-red { color: #fda4af !important; }
        .text-neon-amber { color: #fcd34d !important; }
        .bg-neon-green { background-color: #34d399 !important; }
        .bg-neon-blue { background-color: #38bdf8 !important; }
        .bg-neon-purple { background-color: #8b5cf6 !important; }
        .bg-neon-red { background-color: #fb7185 !important; }
        .bg-neon-amber { background-color: #fbbf24 !important; }
        .bg-neon-green\/20 { background-color: rgba(52, 211, 153, 0.12) !important; }
        .bg-neon-blue\/20 { background-color: rgba(56, 189, 248, 0.12) !important; }
        .bg-neon-purple\/20 { background-color: rgba(139, 92, 246, 0.12) !important; }
        .bg-neon-red\/20 { background-color: rgba(251, 113, 133, 0.12) !important; }
        .bg-neon-amber\/20 { background-color: rgba(251, 191, 36, 0.12) !important; }
        .border-neon-green\/20, .border-neon-green\/30, .border-neon-green\/40, .border-neon-green\/50 { border-color: rgba(52, 211, 153, 0.22) !important; }
        .border-neon-blue\/20, .border-neon-blue\/30, .border-neon-blue\/50 { border-color: rgba(56, 189, 248, 0.20) !important; }
        .border-neon-purple\/20, .border-neon-purple\/30, .border-neon-purple\/50 { border-color: rgba(139, 92, 246, 0.20) !important; }
        .border-neon-red\/20, .border-neon-red\/30 { border-color: rgba(251, 113, 133, 0.22) !important; }
        .border-neon-amber\/50 { border-color: rgba(251, 191, 36, 0.22) !important; }
        .shadow-2xl, .shadow-xl, .shadow-lg, .shadow-md {
            box-shadow: var(--shadow-soft) !important;
        }

        @media (min-width: 768px) {
            .app-shell {
                width: min(100%, 860px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.001ms !important;
            }
        }

        /* Modern dark workspace: these rules deliberately sit last so legacy utility
           classes stay functional without keeping the old neon/glass presentation. */
        :root {
            --app-bg: #0a0d12;
            --app-bg-soft: #10151d;
            --panel: rgba(20, 27, 37, 0.96);
            --panel-soft: rgba(148, 163, 184, 0.075);
            --panel-hover: rgba(148, 163, 184, 0.12);
            --border: rgba(148, 163, 184, 0.16);
            --border-strong: rgba(226, 232, 240, 0.28);
            --radius-xl: 18px;
            --radius-lg: 14px;
            --radius-md: 10px;
            --shadow-panel: 0 14px 32px rgba(0, 0, 0, 0.2);
            --shadow-soft: 0 8px 22px rgba(0, 0, 0, 0.18);
        }

        body {
            background: #0a0d12;
            overflow: auto;
            color-scheme: dark;
        }

        #root { min-height: 100vh; height: auto; overflow: visible; }
        .liquid-bg, .orb { display: none; }
        .glass-card, .glass-nav {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            box-shadow: var(--shadow-panel);
        }
        .glass-card::before { pointer-events: none; }
        .glass-card:hover { transform: none; box-shadow: var(--shadow-panel); }
        .glass-card:active { transform: none; }
        button { touch-action: manipulation; }
        button:hover { transform: none; }
        button[class*="hover:scale"]:hover { transform: none !important; }
        button[class*="shadow-"] { box-shadow: none !important; }
        button:focus-visible, input:focus-visible, select:focus-visible {
            outline: 3px solid rgba(56, 189, 248, 0.45);
            outline-offset: 2px;
        }
        button:disabled { cursor: not-allowed; filter: saturate(0.55); }
        .app-shell { width: min(100%, 1180px); padding-bottom: 104px; }
        .premium-hero {
            background: linear-gradient(135deg, #16202b 0%, #111821 60%, #10201e 100%);
            border-color: rgba(52, 211, 153, 0.22);
        }
        .premium-metric { min-height: 112px; }
        .premium-toolbar { background: #121923; border-radius: 14px; }
        .bottom-nav {
            width: min(calc(100% - 24px), 430px);
            bottom: 12px !important;
            border-radius: 16px;
            background: rgba(18, 25, 35, 0.98);
            display: grid !important;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            box-sizing: border-box;
        }
        .bottom-nav button { min-width: 0; width: 100%; }
        select, option { background-color: #151d28 !important; color: #f8fafc !important; color-scheme: dark; }
        .desktop-rail { display: none !important; }
        .quick-entry-button { min-height: 42px; }
        .modal-surface { background: #151d28; border: 1px solid var(--border-strong); box-shadow: 0 28px 80px rgba(0, 0, 0, 0.48); }
        .status-good { color: #6ee7b7; }
        .status-watch { color: #fcd34d; }
        .status-risk { color: #fda4af; }

        @media (min-width: 768px) {
            .app-shell { width: min(100%, 720px); padding-bottom: 104px; }
            .app-shell > .sticky { margin: 12px 14px 0; border-radius: 14px; }
        }

        /* Phone-first interaction: no bouncing, scaling, or reflow on tap. */
        .tap-feedback, .card-appear, .animate-enter, .streak-flame, .pulse-glow,
        .cycle-renew-banner, .fab-pulse, .empty-float {
            animation: none !important;
            transform: none !important;
        }
        .animate-enter { opacity: 1 !important; }
        .glass-card, .glass-card *, .bottom-nav, .bottom-nav *, button, button *, svg circle {

                            {onboardingStep === 0 && (
                                <div className="text-center animate-enter">
                                    <div className="bg-gradient-to-tr from-neon-green to-neon-blue text-black p-4 rounded-3xl inline-block shadow-[0_0_30px_rgba(0,255,157,0.5)] mb-6"><Icon name="wallet" size={48} /></div>
                                    <h1 className="text-4xl font-black mb-4 tracking-tight text-gradient-premium">BudgetFlow</h1>
                                    <p className="text-slate-400 mb-8 font-medium">Your money, on autopilot. Track cycles, analyze spending, and reach goals.</p>
                                    <button onClick={() => setOnboardingStep(1)} className="w-full py-5 bg-white text-black font-black rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:scale-105 transition-all text-lg">Get Started</button>
                                </div>
                            )}
                            {onboardingStep === 1 && (
                                <div className="animate-enter space-y-6">
                                    <h2 className="text-3xl font-black text-center mb-2">Welcome!</h2>
                                    <p className="text-center text-slate-400 text-sm mb-6">What should we call you?</p>
                                    <input type="text" placeholder="Your Name" value={onboardingName} onChange={e => setOnboardingName(e.target.value)} className="w-full p-5 bg-black/50 border border-glass-200 rounded-2xl font-bold text-white focus:border-neon-purple outline-none text-center text-xl" />
                                    <button onClick={() => setOnboardingStep(2)} disabled={!onboardingName} className="w-full py-5 bg-neon-purple text-white font-black rounded-2xl shadow-[0_0_20px_rgba(189,0,255,0.3)] hover:scale-105 transition-all text-lg disabled:opacity-50">Next <Icon name="arrow-right" className="inline" size={20} /></button>
                                </div>
                            )}
                            {onboardingStep === 2 && (
                                <div className="animate-enter space-y-6">
                                    <h2 className="text-3xl font-black text-center mb-2">Currency</h2>
                                    <p className="text-center text-slate-400 text-sm mb-6">Choose your primary symbol.</p>
                                    <div className="grid grid-cols-3 gap-3">
                                        {['$', '€', '£', '¥', '₹'].map(sym => (
                                            <button key={sym} onClick={() => setOnboardingCurrency(sym)} className={`p-4 rounded-2xl font-black text-2xl transition-all ${onboardingCurrency === sym ? 'bg-neon-blue text-black shadow-[0_0_15px_rgba(6,182,212,0.5)]' : 'bg-glass-100 text-slate-400 border border-glass-200 hover:bg-glass-200'}`}>{sym}</button>
                                        ))}
                                    </div>
                                    <button onClick={() => { localStorage.setItem('onboarding_done_v2', 'true'); localStorage.setItem('user_name', onboardingName); localStorage.setItem('currency', onboardingCurrency); setShowOnboarding(false); }} className="w-full py-5 bg-neon-blue text-black font-black rounded-2xl shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:scale-105 transition-all text-lg mt-4">Let's Go! 🚀</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }
            return (
                <div className="app-shell pb-32 mx-auto min-h-screen relative z-10">
                    <aside className="desktop-rail no-print" aria-label="Primary navigation">
                        <div className="px-3 py-3 mb-2">
                            <div className="text-sm font-black text-white flex items-center gap-2"><Icon name="wallet" size={18} className="text-emerald-300" /> BudgetFlow</div>
                            <p className="text-[10px] text-slate-500 mt-1">Personal finance workspace</p>
                        </div>
                        {[
                            ['dashboard', 'layout-dashboard', 'Overview'],
                            ['add', 'plus-circle', 'New transaction'],
                            ['history', 'receipt-text', 'Transactions'],
                            ['breakdown', 'chart-no-axes-combined', 'Insights'],
                            ['settings', 'settings-2', 'Planning & tools']
                        ].map(([target, icon, label]) => (
                            <button key={target} onClick={() => setView(target)} className={`px-3 rounded-xl text-sm font-bold flex items-center gap-3 transition-colors ${view === target ? 'bg-emerald-400/15 text-emerald-200 border border-emerald-300/20' : 'text-slate-400 hover:text-white hover:bg-white/[0.06]'}`}>
                                <Icon name={icon} size={18} /> {label}
                            </button>
                        ))}
                        <div className="mt-auto px-3 py-3 border-t border-white/10">
                            <p className="text-[10px] uppercase tracking-wide text-slate-500">Safe to spend</p>
                            <p className="text-lg font-black text-emerald-300 mt-1">${safeToSpend.toFixed(0)}</p>
                        </div>
                    </aside>
                    {/* Auto-Cycle Renewed Banner */}
                    {cycleRenewedBanner && (
                        <div className="fixed top-0 left-0 right-0 z-[80] flex justify-center cycle-renew-banner">
                            <div className="bg-gradient-to-r from-neon-purple via-neon-blue to-neon-green text-black font-black py-3 px-8 rounded-b-2xl shadow-2xl text-sm flex items-center gap-2">
                                <Icon name="refresh-cw" size={16} /> {cycleRenewedBanner}
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <div className="sticky top-0 glass-nav p-4 flex justify-between items-center z-50 mx-3 mt-2 no-print">
                        <div className="flex items-center gap-2.5">
                            <div className="bg-emerald-400/15 text-emerald-300 p-2 rounded-xl border border-emerald-300/15"><Icon name="wallet" size={20} /></div>
                            <div>
                                <span className="text-lg text-white font-bold tracking-wide block leading-tight">BudgetFlow</span>
                                <span className="text-[10px] text-slate-500 font-medium">{formatDateShort(now)}</span>
                            </div>
                        </div>
                        <button onClick={() => setShowCycleInfo(true)} className="text-xs font-bold px-3 py-2 rounded-full flex items-center gap-2 text-slate-300 bg-white/5 hover:bg-white/10 border border-white/10">
                            <span className="text-cyan-300 countdown-pulse">{formatCountdown(cycleTimeLeft)}</span>
                            <span className="text-slate-500">Cycle {weeksTracked}</span>
                            <Icon name="chevron-right" size={14} className="opacity-50" />
                        </button>
                    </div>

                    <div className="p-4 md:p-5 space-y-5 md:space-y-6">
                        {/* ========== DASHBOARD ========== */}
                        {view === 'dashboard' && (
                            <div className="animate-enter space-y-6">
                                {/* Hero Balance Card */}
                                <div className="glass-card premium-hero p-6 md:p-8 rounded-[2rem] relative overflow-hidden group">
                                    <div className="absolute -top-24 -right-24 p-8 opacity-[0.055] text-cyan-200"><Icon name="credit-card" size={250} /></div>
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-start mb-2">
                                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest flex items-center gap-2"><Icon name="shield-check" size={12} className={totalFunds < 0 ? "text-rose-300" : "text-emerald-300"} /> Total Balance</p>
                                            <div className="flex items-center gap-2">
                                                {streak > 0 && (
                                                    <div className="px-2 py-1 rounded-full text-xs font-black bg-amber-400/10 text-amber-300 flex items-center gap-1">
                                                        🔥 {streak}d
                                                    </div>
                                                )}
                                                <div className={`px-3 py-1 rounded-full text-xs font-black ${healthScore.bg} text-black flex items-center gap-1`}>
                                                    <Icon name="award" size={12} /> {healthScore.grade}
                                                </div>
                                            </div>
                                        </div>
                                        <h2 className="text-5xl md:text-6xl font-black mb-6 tracking-tight text-gradient-premium">${totalFunds.toFixed(0)}</h2>
                                        <div className="flex flex-wrap gap-2 mb-5 no-print">
                                            <button onClick={() => openQuickEntry('expense')} className="quick-entry-button px-4 rounded-xl bg-rose-400 text-slate-950 text-sm font-black flex items-center gap-2">
                                                <Icon name="minus" size={16} /> Add expense
                                            </button>
                                            <button onClick={() => openQuickEntry('income')} className="quick-entry-button px-4 rounded-xl bg-emerald-300 text-slate-950 text-sm font-black flex items-center gap-2">
                                                <Icon name="plus" size={16} /> Add income
                                            </button>
                                            <button onClick={() => setView('add')} className="quick-entry-button px-4 rounded-xl bg-white/10 text-slate-200 border border-white/10 text-sm font-bold flex items-center gap-2">
                                                <Icon name="sliders-horizontal" size={16} /> Full editor
                                            </button>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2.5">
                                            <div className="bg-white/[0.045] backdrop-blur-xl px-3 py-3 rounded-2xl border border-white/10">
                                                <span className="text-[10px] text-cyan-300 font-bold uppercase tracking-wider flex items-center gap-1"><Icon name="timer" size={10} /> Cycle Ends</span>
                                                <span className="text-sm font-bold text-white mt-1 block">{formatCountdown(cycleTimeLeft)}</span>
                                            </div>
                                            <div className="bg-white/[0.045] backdrop-blur-xl px-3 py-3 rounded-2xl border border-white/10">
                                                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider flex items-center gap-1">Daily Avg</span>
                                                <span className={`text-sm font-bold mt-1 flex items-center gap-1 ${velocityColor}`}>
                                                    ${dailyAvg.toFixed(0)} <Icon name={velocityIcon} size={10} />
                                                </span>
                                            </div>
                                            <div className="bg-white/[0.045] backdrop-blur-xl px-3 py-3 rounded-2xl border border-white/10">
                                                <span className="text-[10px] text-emerald-300 font-bold uppercase tracking-wider flex items-center gap-1"><Icon name="target" size={10} /> Target</span>
                                                <span className="text-sm font-bold text-white mt-1 block">${suggestedDaily.toFixed(0)}/d</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Budget Pace Indicator */}
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="glass-card premium-metric p-4 rounded-2xl">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wide flex items-center gap-1"><Icon name="wallet" size={12} /> Safe to spend</p>
                                        <p className="text-2xl font-black text-emerald-300 mt-1">${safeToSpend.toFixed(0)}</p>
                                        <p className="text-[10px] text-slate-600 mt-1">After unpaid bills and weekly commitments</p>
                                    </div>
                                    <div className="glass-card premium-metric p-4 rounded-2xl">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wide flex items-center gap-1"><Icon name="piggy-bank" size={12} /> Savings rate</p>
                                        <p className={`text-2xl font-black mt-1 ${savingsRate >= 0 ? 'text-cyan-300' : 'text-rose-300'}`}>{savingsRate.toFixed(0)}%</p>
                                        <p className="text-[10px] text-slate-600 mt-1">${monthlyIncome.toFixed(0)} in / ${monthlyExpenses.toFixed(0)} out</p>
                                    </div>
                                    <div className="glass-card premium-metric p-4 rounded-2xl">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wide flex items-center gap-1"><Icon name="file-clock" size={12} /> Bills left</p>
                                        <p className="text-2xl font-black text-amber-300 mt-1">${unpaidBillsTotal.toFixed(0)}</p>
                                        <p className="text-[10px] text-slate-600 mt-1">{billsWithStatus.filter(b => !b.isPaid).length} unpaid this month</p>
                                    </div>
                                    <div className="glass-card premium-metric p-4 rounded-2xl">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wide flex items-center gap-1"><Icon name="calendar-range" size={12} /> Month-end forecast</p>
                                        <p className={`text-2xl font-black mt-1 ${forecastTone}`}>${forecastMonthEnd.toFixed(0)}</p>
                                        <p className="text-[10px] text-slate-600 mt-1">Projected ${projectedMonthlySpend.toFixed(0)} spend this month</p>
                                    </div>
                                </div>

                                {/* Budget Pace Indicator */}
                                {weeklyBudgetTotal > 0 && (
                                    <div className="glass-card p-5 rounded-3xl">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-xs font-bold text-slate-400 uppercase tracking-wide flex items-center gap-2">
                                                <Icon name="gauge" size={14} className="text-neon-amber" /> Weekly Pace
                                            </span>
                                            <span className={`text-xs font-black px-2 py-1 rounded-full ${paceRatio <= 0.85 ? 'bg-neon-green/20 text-neon-green' : paceRatio <= 1.1 ? 'bg-yellow-400/20 text-yellow-400' : 'bg-neon-red/20 text-neon-red'}`}>
                                                {paceLabel}
                                            </span>
                                        </div>
                                        <div className="w-full h-3 bg-glass-200 rounded-full overflow-hidden mb-2 relative">
                                            {/* Expected pace marker */}
                                            <div className="absolute h-full w-0.5 bg-white/40 z-10" style={{ left: `${Math.min(cycleProgress, 100)}%` }}></div>
                                            {/* Actual spending bar */}
                                            <div className={`h-full rounded-full transition-all duration-700 ${paceRatio <= 0.85 ? 'bg-neon-green' : paceRatio <= 1.1 ? 'bg-yellow-400' : 'bg-neon-red'}`}
                                                style={{ width: `${Math.min((weeklySpentThisCycle / weeklyBudgetTotal) * 100, 100)}%` }}></div>
                                        </div>
                                        <div className="flex justify-between text-[10px] text-slate-500 font-medium">
                                            <span>Spent: <span className="text-white font-bold">${weeklySpentThisCycle.toFixed(0)}</span> / ${weeklyBudgetTotal}</span>
                                            <span>Budget/day: <span className={`font-bold ${paceColor}`}>${dailyBudgetLeft.toFixed(0)}</span></span>
                                        </div>
                                    </div>
                                )}

                                {/* Category Cards */}
                                <div className="space-y-3">
                                    {sortedCategories.map((cat, idx) => {
                                        const pct = Math.min(100, Math.max(0, (cat.balance / cat.limit) * 100));
                                        const spent = cat.limit - cat.balance;
                                        const isLow = cat.balance < 0;
                                        const isWarning = pct < 30 && pct > 0;
                                        const ringColor = isLow ? 'stroke-neon-red' : isWarning ? 'stroke-yellow-400' : 'stroke-neon-green';
                                        const circumference = 2 * Math.PI * 20;
                                        const strokeDashoffset = circumference - (pct / 100) * circumference;
                                        return (
                                            <div key={cat.id}
                                                className={`glass-card p-4 rounded-2xl ${isLow ? 'border-rose-300/25' : isWarning ? 'border-amber-300/25' : 'border-white/10'}`}
                                            >
                                                <div className="category-row">
                                                    <div className="category-details flex items-center gap-3">
                                                        <div className="relative">
                                                            <svg className="w-12 h-12 -rotate-90" viewBox="0 0 48 48">
                                                                <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="4" />
                                                                <circle cx="24" cy="24" r="20" fill="none" className={ringColor} strokeWidth="4" strokeLinecap="round"
                                                                    style={{ strokeDasharray: circumference, strokeDashoffset: isLow ? 0 : strokeDashoffset, transition: 'stroke-dashoffset 1s ease-out' }} />
                                                            </svg>
                                                            <div className={`absolute inset-0 flex items-center justify-center ${cat.color}`}>
                                                                <Icon name={cat.icon} size={18} />
                                                            </div>
                                                        </div>
                                                        <div className="min-w-0">
                                                            <div className="flex items-center gap-2">
                                                                <h3 className="font-bold text-white text-base tracking-tight truncate">{cat.name}</h3>
                                                                {cat.pinned && <span className="text-neon-amber text-xs">⭐</span>}
                                                                {cat.recurring && <span className="text-neon-blue text-xs">🔁</span>}
                                                            </div>
                                                            <p className="text-xs text-slate-500 font-medium">
                                                                <span className={isLow ? 'text-neon-red' : 'text-slate-400'}>${spent.toFixed(0)}</span>
                                                                <span className="text-slate-600"> / ${cat.limit}</span>
                                                                <span className="text-slate-600 ml-1">• {cat.frequency}</span>
                                                            </p>
                                                        </div>
                                                    </div>
                                                    <button
                                                        type="button"
                                                        onClick={() => openQuickEntry('expense', cat.id)}
                                                        aria-label={`Record expense from ${cat.name}`}
                                                        title={`Record expense from ${cat.name}`}
                                                        className="category-spend-button rounded-xl bg-rose-400/15 text-rose-200 border border-rose-300/20"
                                                    >
                                                        <Icon name="minus" size={16} />
                                                    </button>
                                                    <div className="category-balance">
                                                        <span className={`block text-xl font-black ${isLow ? 'text-rose-300' : isWarning ? 'text-amber-300' : 'text-white'}`}>${cat.balance.toFixed(0)}</span>
                                                        <span className={`text-[10px] font-bold uppercase tracking-widest ${isLow ? 'text-rose-300' : isWarning ? 'text-amber-300' : 'text-slate-500'}`}>
                                                            {isLow ? 'Overdrawn' : isWarning ? 'Low' : 'Left'}
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>

                                {/* Weekly Mini Chart */}
                                <div className="glass-card p-5 rounded-3xl">
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wide flex items-center gap-2">
                                            <Icon name="bar-chart-3" size={14} className="text-neon-blue" /> This Week
                                        </h3>
                                        <span className="text-xs text-slate-500">
                                            {cycleStartDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – {cycleEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                                        </span>
                                    </div>
                                    <div className="flex items-end justify-between h-16 gap-1">
                                        {weeklyTrend.map((d, i) => (
                                            <div key={i} className="flex flex-col items-center gap-1 flex-1 group relative">
                                                <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-black/90 px-2 py-1 rounded text-[10px] font-bold text-white opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10">
                                                    ${d.total.toFixed(0)}
                                                </div>
                                                <div className="w-full relative h-12 flex items-end">
                                                    <div className={`w-full rounded-t transition-all duration-500 ${i === weeklyTrend.length - 1 ? 'bg-neon-green shadow-[0_0_10px_rgba(0,255,157,0.3)]' : 'bg-neon-blue/60'}`}
                                                        style={{ height: `${Math.max(d.pct, d.total > 0 ? 12 : 4)}%` }}></div>
                                                </div>
                                                <span className={`text-[8px] font-bold ${i === weeklyTrend.length - 1 ? 'text-white' : 'text-slate-600'}`}>{d.label.charAt(0)}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Recent Transactions Preview */}
                                {transactions.filter(t => t.categoryId !== 'system').length > 0 && (
                                    <div className="glass-card p-5 rounded-3xl animate-enter">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wide flex items-center gap-2">
                                                <Icon name="activity" size={14} className="text-neon-blue" /> Recent
                                            </h3>
                                            <button onClick={() => setView('history')} className="text-xs text-neon-blue font-bold hover:underline">See all</button>
                                        </div>
                                        <div className="space-y-2">
                                            {transactions.filter(t => t.categoryId !== 'system').slice(0, 3).map(t => (
                                                <div key={t.id} className="flex justify-between items-center p-3 bg-glass-100 rounded-xl hover:bg-glass-200 transition-colors tap-feedback">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`p-2 rounded-lg ${t.type === 'income' ? 'bg-neon-green/20 text-neon-green' : 'bg-neon-red/20 text-neon-red'}`}>
                                                            <Icon name={t.type === 'income' ? 'arrow-down' : 'arrow-up'} size={14} />
                                                        </div>
                                                        <div>
                                                            <p className="font-medium text-white text-sm flex items-center gap-1">
                                                                {t.description}
                                                                {t.recurring && t.recurring !== 'none' && <span className="text-[9px] text-neon-blue bg-neon-blue/10 px-1.5 py-0.5 rounded">🔁</span>}
                                                            </p>
                                                            <p className="text-[10px] text-slate-500">{t.categoryName} • {new Date(t.date).toLocaleDateString('en-US', { weekday: 'short' })}</p>
                                                        </div>
                                                    </div>
                                                    <span className={`font-bold ${t.type === 'income' ? 'text-neon-green' : 'text-neon-red'}`}>
                                                        {t.type === 'income' ? '+' : '-'}${parseFloat(t.amount).toFixed(0)}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Achievements */}
                                {achievements.length > 0 && (
                                    <div className="glass-card p-4 rounded-3xl">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-3 flex items-center gap-2">
                                            <Icon name="trophy" size={14} className="text-neon-amber" /> Achievements
                                        </h3>
                                        <div className="flex flex-wrap gap-2">
                                            {achievements.includes('7day') && <span className="px-3 py-1.5 rounded-full text-xs font-bold bg-orange-500/20 text-orange-400 border border-orange-500/30">🔥 7-Day Streak</span>}
                                            {achievements.includes('30day') && <span className="px-3 py-1.5 rounded-full text-xs font-bold bg-yellow-500/20 text-yellow-400 border border-yellow-500/30">⭐ 30-Day Streak</span>}
                                            {achievements.includes('no_overdraft') && <span className="px-3 py-1.5 rounded-full text-xs font-bold bg-neon-green/20 text-neon-green border border-neon-green/30">💎 No Overdraft</span>}
                                        </div>
                                    </div>
                                )}

                                {/* Savings Goals UI */}
                                {savingsGoals.length > 0 && (
                                    <div className="glass-card p-5 rounded-3xl animate-enter">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wide flex items-center gap-2">
                                                <Icon name="target" size={14} className="text-neon-green" /> Savings Goals
                                            </h3>
                                        </div>
                                        <div className="space-y-4">
                                            {savingsGoals.map(g => (
                                                <div key={g.id} className="relative p-4 bg-black/40 rounded-2xl border border-glass-200">
                                                    <div className="flex justify-between mb-2">
                                                        <span className="font-bold text-white flex items-center gap-2">
                                                            <Icon name={g.icon} size={14} style={{ color: g.color }} /> {g.name}
                                                        </span>
                                                        <span className="font-bold text-slate-300">
                                                            ${g.saved.toFixed(0)} / ${g.target.toFixed(0)}
                                                        </span>
                                                    </div>
                                                    <div className="w-full bg-glass-200 rounded-full h-2 mb-3">
                                                        <div className="h-2 rounded-full transition-all duration-500" style={{ width: `${Math.min(100, (g.saved / g.target) * 100)}%`, backgroundColor: g.color }}></div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => setShowGoalDeposit(g.id)} className="flex-1 py-1.5 bg-neon-green/20 text-neon-green rounded-xl text-xs font-bold hover:bg-neon-green/30">Deposit</button>
                                                        <button onClick={() => handleGoalWithdraw(g.id, prompt('Amount to withdraw:'))} className="flex-1 py-1.5 bg-neon-red/20 text-neon-red rounded-xl text-xs font-bold hover:bg-neon-red/30">Withdraw</button>
                                                    </div>
                                                    {showGoalDeposit === g.id && (
                                                        <div className="mt-3 flex gap-2">
                                                            <input type="number" placeholder="$" value={goalDepositAmt} onChange={e => setGoalDepositAmt(e.target.value)} className="flex-1 p-2 rounded-xl bg-black/60 border border-glass-200 text-white text-sm" />
                                                            <button onClick={() => handleGoalDeposit(g.id, goalDepositAmt)} className="p-2 bg-neon-green text-black font-bold rounded-xl"><Icon name="check" size={16} /></button>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Subscriptions UI */}
                                {subscriptions.length > 0 && (
                                    <div className="glass-card p-5 rounded-3xl animate-enter">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wide flex items-center gap-2">

                                        </div>
                                        <div className="space-y-2">
                                            {upcomingSubs.map(s => (
                                                <div key={s.id} className="flex justify-between items-center p-3 bg-black/40 rounded-xl border border-neon-purple/30">

                                                        <div className="p-2 bg-neon-purple/20 text-neon-purple rounded-lg"><Icon name={s.icon} size={14} /></div>
                                                        <div>
                                                            <p className="font-bold text-white text-sm">{s.name}</p>
                                                            <p className="text-[10px] text-neon-purple font-bold">Due: {new Date(s.nextDue).toLocaleDateString()}</p>
                                                        </div>
                                                    </div>
                                                    <span className="font-bold text-neon-red">${s.amount.toFixed(0)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Bills UI */}
                                {billsWithStatus.length > 0 && (
                                    <div className="glass-card p-5 rounded-3xl animate-enter">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wide flex items-center gap-2">
                                                <Icon name="file-text" size={14} className="text-neon-amber" /> Upcoming Bills

                                                        <button onClick={() => !b.isPaid && handleMarkBillPaid(b.id)} className={`w-6 h-6 rounded-full flex items-center justify-center border-2 ${b.isPaid ? 'bg-neon-green border-neon-green text-black' : 'border-slate-500 text-transparent hover:border-neon-green'}`}>

                                                        </button>
                                                        <div>
                                                            <p className={`font-bold text-sm ${b.isPaid ? 'text-slate-400 line-through' : 'text-white'}`}>{b.name}</p>
                                                            <p className={`text-[10px] font-bold ${b.isPaid ? 'text-slate-500' : b.isOverdue ? 'text-neon-red' : b.isDueSoon ? 'text-neon-amber' : 'text-slate-400'}`}>
                                                                {b.isPaid ? 'Paid' : b.isOverdue ? 'Overdue!' : b.daysUntilDue === 0 ? 'Due Today!' : `Due in ${b.daysUntilDue}d`}
                                                            </p>
                                                        </div>
                                                    </div>
                                                    <span className={`font-bold ${b.isPaid ? 'text-slate-500' : 'text-white'}`}>${b.amount.toFixed(0)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Net Worth UI */}
                                {netWorthItems.length > 0 && (
                                    <div className="glass-card p-5 rounded-3xl animate-enter">
                                        <div className="flex justify-between items-center mb-2">
                                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wide flex items-center gap-2">
                                                <Icon name="landmark" size={14} className="text-neon-blue" /> Net Worth
                                            </h3>
                                            <span className={`font-black text-xl ${netWorth >= 0 ? 'text-neon-green' : 'text-neon-red'}`}>
                                                ${netWorth.toFixed(0)}
                                            </span>
                                        </div>
                                        <div className="flex gap-4 mt-2">
                                            <div className="flex-1 bg-black/40 p-2 rounded-xl text-center border border-neon-green/20">
                                                <p className="text-[10px] text-slate-400 uppercase">Assets</p>
                                                <p className="font-bold text-neon-green">${totalAssets.toFixed(0)}</p>
                                            </div>
                                            <div className="flex-1 bg-black/40 p-2 rounded-xl text-center border border-neon-red/20">
                                                <p className="text-[10px] text-slate-400 uppercase">Liabilities</p>
                                                <p className="font-bold text-neon-red">${totalLiabilities.toFixed(0)}</p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Heatmap UI */}
                                <div className="glass-card p-5 rounded-3xl animate-enter">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wide flex items-center gap-2">
                                            <Icon name="calendar" size={14} className="text-neon-purple" /> Spending Heatmap
                                        </h3>
                                        <div className="flex gap-2 items-center">
                                            <button onClick={() => { const d = new Date(heatmapMonth); d.setMonth(d.getMonth() - 1); setHeatmapMonth(d); }} className="text-slate-500 hover:text-white p-1"><Icon name="chevron-left" size={14} /></button>
                                            <span className="text-xs font-bold text-slate-300 min-w-[60px] text-center">{heatmapMonth.toLocaleDateString('en-US', { month: 'short', year: '2-digit' })}</span>
                                            <button onClick={() => { const d = new Date(heatmapMonth); d.setMonth(d.getMonth() + 1); setHeatmapMonth(d); }} className="text-slate-500 hover:text-white p-1"><Icon name="chevron-right" size={14} /></button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-7 gap-1.5 mb-2">
                                        {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map((d, i) => <div key={i} className="text-center text-[9px] font-bold text-slate-500">{d}</div>)}
                                        {(() => {
                                            const firstDay = new Date(heatmapMonth.getFullYear(), heatmapMonth.getMonth(), 1).getDay();
                                            const daysInMonth = new Date(heatmapMonth.getFullYear(), heatmapMonth.getMonth() + 1, 0).getDate();
                                            const cells = Array(42).fill(null);
                                            for(let i=0; i<daysInMonth; i++) {
                                                const d = new Date(heatmapMonth.getFullYear(), heatmapMonth.getMonth(), i+1);
                                                const total = transactions.filter(t => t.type === 'expense' && new Date(t.date).toDateString() === d.toDateString()).reduce((s, t) => s + parseFloat(t.amount), 0);
                                                cells[firstDay + i] = total;
                                            }
                                            const maxSpend = Math.max(...cells.filter(c => c !== null)) || 1;
                                            return cells.map((amt, i) => {
                                                if(amt === null) return <div key={i} className="aspect-square rounded-md bg-transparent"></div>;
                                                const intensity = amt === 0 ? 0.05 : Math.max(0.2, amt / maxSpend);
                                                return <div key={i} title={amt > 0 ? `$${amt.toFixed(0)} spent` : 'No spending'} className="aspect-square rounded-md transition-all hover:scale-110 cursor-pointer" style={{ backgroundColor: `rgba(189, 0, 255, ${intensity})`, border: '1px solid rgba(255,255,255,0.02)' }}></div>
                                            });
                                        })()}
                                    </div>
                                </div>

                                {/* Wishlist UI */}
                                {wishlist.length > 0 && (
                                    <div className="glass-card p-5 rounded-3xl animate-enter">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wide flex items-center gap-2">
                                                <Icon name="star" size={14} className="text-white" /> Wishlist
                                            </h3>
                                        </div>
                                        <div className="space-y-3">
                                            {wishlist.map(w => (

                                                        <p className="font-bold text-white text-sm">{w.name}</p>
                                                        <p className="text-[10px] text-slate-400 uppercase font-bold">{w.priority} priority</p>
                                                    </div>
                                                    <span className="font-bold text-white">${w.price.toFixed(0)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Features Grid */}
                                <div className="grid grid-cols-5 gap-2 mt-2">

                                        <Icon name="target" size={18} className="text-neon-green" /> <span className="text-[9px] font-bold text-slate-400 uppercase">Goal</span>
                                    </button>
                                    <button onClick={() => setShowAddSub(true)} className="glass-card p-3 rounded-2xl flex flex-col items-center gap-1.5 hover:bg-glass-200 tap-feedback">
                                        <Icon name="credit-card" size={18} className="text-neon-purple" /> <span className="text-[9px] font-bold text-slate-400 uppercase">Sub</span>
                                    </button>
                                    <button onClick={() => setShowAddBill(true)} className="glass-card p-3 rounded-2xl flex flex-col items-center gap-1.5 hover:bg-glass-200 tap-feedback">
                                        <Icon name="file-text" size={18} className="text-neon-amber" /> <span className="text-[9px] font-bold text-slate-400 uppercase">Bill</span>
                                    </button>
                                    <button onClick={() => setShowAddNetWorth(true)} className="glass-card p-3 rounded-2xl flex flex-col items-center gap-1.5 hover:bg-glass-200 tap-feedback">
                                        <Icon name="landmark" size={18} className="text-neon-blue" /> <span className="text-[9px] font-bold text-slate-400 uppercase">Asset</span>
                                    </button>
                                    <button onClick={() => setShowAddWish(true)} className="glass-card p-3 rounded-2xl flex flex-col items-center gap-1.5 hover:bg-glass-200 tap-feedback">
                                        <Icon name="star" size={18} className="text-white" /> <span className="text-[9px] font-bold text-slate-400 uppercase">Wish</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ========== AI AGENT ========== */}
                        {view === 'ai' && (
                            <div className="animate-enter h-[75vh] flex flex-col glass-card rounded-[2.5rem] overflow-hidden border border-neon-blue/20 shadow-[0_0_50px_rgba(6,182,212,0.1)]">
                                <div className="bg-glass-100 p-4 border-b border-glass-200 font-bold text-center text-white flex items-center justify-center gap-2"><Icon name="sparkles" className="text-neon-blue" /> Gemini Agent</div>
                                <div className="flex gap-2 p-3 px-4 overflow-x-auto hide-scrollbar border-b border-glass-100 bg-black/20">
                                    <button onClick={(e) => handleSendMessage(e, "Analyze my spending patterns and give me 3 hard truths.")} className="bg-glass-100 px-4 py-2 rounded-xl text-xs font-bold text-slate-300 hover:bg-neon-red hover:text-black transition-all border border-glass-200 whitespace-nowrap">🔥 Roast Me</button>
                                    <button onClick={(e) => handleSendMessage(e, "Project my balance for next week based on trends.")} className="bg-glass-100 px-4 py-2 rounded-xl text-xs font-bold text-slate-300 hover:bg-neon-blue hover:text-black transition-all border border-glass-200 whitespace-nowrap">🔮 Forecast</button>
                                    <button onClick={(e) => handleSendMessage(e, "Identify potential subscriptions or recurring bills I might have missed.")} className="bg-glass-100 px-4 py-2 rounded-xl text-xs font-bold text-slate-300 hover:bg-neon-purple hover:text-white transition-all border border-glass-200 whitespace-nowrap">🕵️ Subs Detective</button>
                                    <button onClick={(e) => handleSendMessage(e, "Create a 'Financial Persona' for me based on my spending habits. Be creative and fun!")} className="bg-glass-100 px-4 py-2 rounded-xl text-xs font-bold text-slate-300 hover:bg-yellow-400 hover:text-black transition-all border border-glass-200 whitespace-nowrap">🎭 My Persona</button>
                                    <button onClick={(e) => handleSendMessage(e, "How can I cut costs without being miserable?")} className="bg-glass-100 px-4 py-2 rounded-xl text-xs font-bold text-slate-300 hover:bg-neon-green hover:text-black transition-all border border-white/10 whitespace-nowrap">💰 Save</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-5 space-y-6">
                                    {chatHistory.map((msg, i) => (
                                        <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed shadow-lg ${msg.role === 'user' ? 'bg-neon-blue text-black font-medium rounded-tr-none' : 'bg-glass-100 text-slate-200 rounded-tl-none border border-glass-200'}`}>
                                                {msg.role === 'model' ? <MarkdownText text={msg.text} /> : msg.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isThinking && <div className="flex justify-start"><div className="bg-glass-100 p-4 rounded-2xl rounded-tl-none text-xs text-neon-blue font-bold animate-pulse border border-glass-200 flex items-center gap-2"><Icon name="loader" className="animate-spin" size={14} /> Reasoning...</div></div>}
                                    {reportCard && (
                                        <div className="bg-black/40 p-4 rounded-xl border border-neon-purple/30 text-sm leading-relaxed">
                                            <h3 className="text-neon-purple font-bold mb-2 flex items-center gap-2"><Icon name="file-text" size={16} /> Report Card</h3>
                                            <MarkdownText text={reportCard} />
                                        </div>
                                    )}
                                    <div ref={chatEndRef}></div>
                                </div>
                                <form onSubmit={handleSendMessage} className="p-4 bg-black/40 border-t border-glass-200 flex gap-3 backdrop-blur-xl">
                                    <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder="Ask Gemini..." className="flex-1 p-4 rounded-2xl bg-glass-100 border border-glass-200 text-white text-sm focus:border-neon-blue focus:bg-glass-200 transition-all placeholder-slate-500" />
                                    <button type="submit" className="bg-neon-blue p-4 rounded-2xl text-black shadow-[0_0_20px_rgba(6,182,212,0.4)] hover:scale-105 transition-transform"><Icon name="send" size={20} /></button>
                                </form>
                            </div>
                        )}

                        {/* ========== ADD & ACTIONS ========== */}
                        {view === 'add' && (
                            <div className="glass-card p-6 rounded-[2.5rem] mt-4 animate-enter border-t border-glass-200 relative">
                                <h2 className="text-3xl font-black text-center mb-8 tracking-tight text-gradient-premium">New Entry</h2>

                                <div className="grid grid-cols-2 gap-3 mb-8">
                                    <button onClick={() => receiptInputRef.current.click()} className="bg-glass-100 p-5 rounded-2xl flex flex-col items-center gap-2 hover:bg-glass-200 border border-glass-200 text-neon-blue transition-all group">
                                        <div className="p-3 bg-neon-blue/10 rounded-full group-hover:scale-110 transition-transform"><Icon name="scan-line" /></div>

                                        {isThinking && <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center rounded-2xl z-10"><Icon name="loader" className="animate-spin text-white" /></div>}
                                        <input type="file" ref={receiptInputRef} onChange={handleScan} className="hidden" accept="image/*" />
                                    </button>
                                    <button onClick={(e) => handleSendMessage(e, "I want to buy something for $___. Can I afford it based on my current balance and bills?")} className="bg-glass-100 p-5 rounded-2xl flex flex-col items-center gap-2 hover:bg-glass-200 border border-glass-200 text-neon-red transition-all group">
                                        <div className="p-3 bg-neon-red/10 rounded-full group-hover:scale-110 transition-transform"><Icon name="brain-circuit" /></div>
                                        <span className="text-xs font-bold">Can I Afford?</span>
                                    </button>
                                </div>

                                <div className="relative mb-8 group">
                                    <input type="text" value={magicText} onChange={e => setMagicText(e.target.value)} placeholder="Magic: 'Spent 50 on gas'" className="w-full p-5 bg-black/30 rounded-2xl border border-white/10 text-center text-sm font-bold text-white focus:border-neon-purple focus:bg-black/50 transition-all placeholder-slate-600" />
                                    <button onClick={handleMagic} className="absolute right-3 top-1/2 -translate-y-1/2 text-neon-purple p-2 hover:bg-glass-200 rounded-xl transition-all"><Icon name="sparkles" size={20} /></button>
                                </div>

                                <div className="flex bg-black/40 p-1.5 rounded-2xl mb-8 border border-glass-200">
                                    <button onClick={() => setNewTransaction({ ...newTransaction, type: 'expense' })} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${newTransaction.type === 'expense' ? 'bg-neon-red text-black shadow-[0_0_15px_rgba(255,0,85,0.4)]' : 'text-slate-500 hover:text-slate-300'}`}>Expense</button>
                                    <button onClick={() => setNewTransaction({ ...newTransaction, type: 'income' })} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${newTransaction.type === 'income' ? 'bg-neon-green text-black shadow-[0_0_15px_rgba(0,255,157,0.4)]' : 'text-slate-500 hover:text-slate-300'}`}>Income</button>
                                    <button onClick={() => setNewTransaction({ ...newTransaction, type: 'transfer' })} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${newTransaction.type === 'transfer' ? 'bg-neon-blue text-black shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-500 hover:text-slate-300'}`}>Transfer</button>
                                    <button onClick={() => setShowSplitTx(true)} className="flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-300">Split</button>
                                </div>

                                {newTransaction.type === 'transfer' ? (
                                    <form onSubmit={handleTransfer} className="space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <select className="w-full p-4 bg-black/30 border border-glass-200 rounded-2xl font-bold text-sm" value={transferData.fromId} onChange={e => setTransferData({ ...transferData, fromId: e.target.value })}><option value="">From</option>{categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                                            <select className="w-full p-4 bg-black/30 border border-glass-200 rounded-2xl font-bold text-sm" value={transferData.toId} onChange={e => setTransferData({ ...transferData, toId: e.target.value })}><option value="">To</option>{categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                                        </div>
                                        <input type="number" step="0.01" className="w-full p-6 bg-black/30 border border-glass-200 rounded-3xl font-black text-4xl text-center text-white focus:border-neon-blue transition-all" placeholder="$0.00" value={transferData.amount} onChange={e => setTransferData({ ...transferData, amount: e.target.value })} />
                                        <button type="submit" className="w-full py-5 bg-neon-blue hover:bg-cyan-400 text-black font-bold rounded-2xl shadow-[0_0_20px_rgba(6,182,212,0.3)] transition-all mt-2 text-lg">Move Funds</button>
                                    </form>
                                ) : (
                                    <form onSubmit={handleAdd} className="space-y-6">
